<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Web CSGO Online - Dust2</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }

        /* 开始屏幕样式 */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://raw.githubusercontent.com/mdn/learning-area/master/html/multimedia-and-embedding/video-and-audio-content/rabbit320.png'); /* 这里你可以换成自己的Dust2背景图 */
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; transition: opacity 0.5s;
        }
        #start-logo { color: #ffce00; font-size: 48px; font-weight: bold; text-shadow: 3px 3px 0 #000; margin-bottom: 20px; letter-spacing: 5px; }
        #start-button {
            padding: 15px 50px; font-size: 24px; background: #ff9800; color: white; border: none;
            cursor: pointer; border-radius: 5px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        #start-button:active { transform: scale(0.95); background: #e65100; }
        #loading-text { color: white; margin-top: 15px; font-size: 18px; }

        /* 游戏原有 UI */
        #crosshair { position: fixed; top: 50%; left: 50%; width: 4px; height: 4px; background: #00ff00; transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; z-index: 10; box-shadow: 0 0 5px #00ff00; display: none; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ff00; pointer-events: none; }
        #crosshair::before { top: -8px; left: 1px; width: 2px; height: 20px; }
        #crosshair::after { left: -8px; top: 1px; width: 20px; height: 2px; }

        #ui-container { display: none; } /* 初始隐藏所有游戏UI */
        #ui { position: fixed; top: 10px; left: 10px; color: white; pointer-events: none; z-index: 10; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; font-size: 14px; }
        #team-select { position: fixed; top: 50px; left: 10px; z-index: 15; display: flex; gap: 10px; }
        button { padding: 10px 15px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #btn-red { background-color: #d32f2f; } #btn-blue { background-color: #1976d2; }
        #btn-view { position: fixed; top: 100px; left: 10px; z-index: 15; background-color: #ff9800; }
        #coords-display { position: fixed; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.7); border: 1px solid #00ff00; color: #00ff00; padding: 8px 15px; border-radius: 5px; font-family: monospace; z-index: 20; }
        #health-display { position: fixed; bottom: 40px; left: 40px; background: rgba(0, 0, 0, 0.7); border: 1px solid #ff5555; color: #ff5555; padding: 8px 15px; border-radius: 5px; font-size: 24px; font-weight: bold; z-index: 20; }
        #ammo-display { position: fixed; bottom: 40px; right: 40px; background: rgba(0, 0, 0, 0.7); border: 1px solid #ffce00; color: #ffce00; padding: 8px 15px; border-radius: 5px; font-size: 24px; font-weight: bold; z-index: 20; }
        #joystick-base { position: fixed; width: 100px; height: 100px; background: rgba(0, 0, 0, 0.4); border: 2px solid rgba(0, 0, 0, 0.7); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; display: none; z-index: 30; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: rgba(0, 0, 0, 0.9); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #btn-jump { position: fixed; bottom: 100px; right: 40px; width: 70px; height: 70px; background: rgba(0, 0, 0, 0.4); border: 2px solid rgba(0, 0, 0, 0.7); border-radius: 50%; color: white; font-weight: bold; z-index: 30; }
        #btn-reload { position: fixed; bottom: 110px; right: 130px; width: 50px; height: 50px; background: rgba(0, 0, 0, 0.4); border: 2px solid rgba(0, 0, 0, 0.7); border-radius: 50%; color: white; font-weight: bold; z-index: 30; }
        #online-count { position: fixed; top: 140px; left: 10px; background: rgba(0, 0, 0, 0.7); border: 1px solid #00ffff; color: #00ffff; padding: 5px 10px; border-radius: 5px; z-index: 20; }
        #hit-marker { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: red; font-size: 24px; font-weight: bold; pointer-events: none; opacity: 0; z-index: 15; }
        #muzzle-flash { position: fixed; top: 50%; left: 50%; width: 100vw; height: 100vh; background: rgba(255, 200, 0, 0.1); transform: translate(-50%, -50%); pointer-events: none; opacity: 0; z-index: 5; }
        #afk-warning { position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%); background: rgba(255, 0, 0, 0.85); color: white; padding: 15px 30px; font-size: 20px; font-weight: bold; border-radius: 8px; z-index: 100; display: none; text-align: center; }
        #kick-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.95); color: #ff5555; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="start-screen">
        <div id="start-logo">WEB CSGO</div>
        <button id="start-button">START GAME</button>
        <div id="loading-text">资源加载中... 0%</div>
    </div>

    <div id="ui-container">
        <div id="ui">多人在线版 (防挂机系统)</div>
        <div id="online-count">在线人数: 连接中...</div>
        <div id="coords-display">X: 0.00 | Z: 0.00</div>
        <div id="health-display">HP: 100</div>
        <div id="ammo-display">7 / 42</div>
        <button id="btn-reload">R</button>
        <div id="team-select">
            <button id="btn-red">加入红队 (T)</button>
            <button id="btn-blue">加入蓝队 (CT)</button>
        </div>
        <button id="btn-view">👁️ 切换视角</button>
        <button id="btn-jump">JUMP</button>
        <div id="joystick-base"><div id="joystick-stick"></div></div>
        <div id="crosshair"></div>
        <div id="hit-marker">✖</div>
        <div id="muzzle-flash"></div>
        <div id="afk-warning">⚠️ 警告: 你已经很久没动了！<br>请在 <span id="afk-countdown">10</span> 秒内活动</div>
    </div>

    <div id="kick-screen">
        <h1>已断开连接</h1>
        <p>你因为长时间未活动 (AFK) 被移出游戏。</p>
        <button onclick="location.reload()">重新连接</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { MTLLoader } from 'three/addons/loaders/MTLLoader.js'; 
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, update, onValue, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX5TKLKkC_oHklROdhSB5QtdGZIu_9yIo",
            authDomain: "diddy-gun-game.firebaseapp.com",
            databaseURL: "https://diddy-gun-game-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "diddy-gun-game",
            storageBucket: "diddy-gun-game.firebasestorage.app",
            messagingSenderId: "712812379030",
            appId: "1:712812379030:web:13f04859c2651d177cfbb7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        let myUid = null;
        let remotePlayers = {}; 
        let lastActionTime = Date.now();
        let isKicked = false;
        let gameStarted = false; // 标记游戏是否真正开始

        const startScreen = document.getElementById('start-screen');
        const startButton = document.getElementById('start-button');
        const uiContainer = document.getElementById('ui-container');
        const crosshair = document.getElementById('crosshair');
        const loadingText = document.getElementById('loading-text');

        // 开始按钮点击事件
        startButton.addEventListener('click', () => {
            gameStarted = true;
            lastActionTime = Date.now(); // 点击开始后重置计时
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
                uiContainer.style.display = 'block';
                crosshair.style.display = 'block';
            }, 500);
        });

        function resetAFK() {
            if (isKicked || !gameStarted) return;
            lastActionTime = Date.now();
            document.getElementById('afk-warning').style.display = 'none';
        }

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); 
        const clock = new THREE.Clock(); 
        let mixers = []; 
        const playerContainer = new THREE.Group();
        playerContainer.position.set(2, 1.25, 15); 
        scene.add(playerContainer);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        playerContainer.add(camera); 
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(100, 200, 50);
        scene.add(dirLight);

        let mapMesh = null;
        const objLoader = new OBJLoader();
        const mtlLoader = new MTLLoader(); 
        const gltfLoader = new GLTFLoader();

        mtlLoader.load('de_dust2.mtl?v=3', function (materials) {
            materials.preload();
            objLoader.setMaterials(materials);
            objLoader.load('de_dust2.obj?v=3', (object) => {
                object.scale.set(0.02, 0.02, 0.02); 
                object.rotation.x = -Math.PI / 2; 
                scene.add(object);
                mapMesh = object;
            }, (xhr) => {
                if (xhr.lengthComputable) {
                    let p = Math.round(xhr.loaded / xhr.total * 100);
                    loadingText.innerText = `地图加载中 ${p}%`;
                }
            });
        });

        let myBody = null;
        let isTPS = false; 
        gltfLoader.load('dancing_banana.glb?v=2', (gltf) => {
            myBody = gltf.scene;
            myBody.scale.set(2.5, 2.5, 2.5); 
            myBody.position.set(0, -1.25, 0); 
            myBody.rotation.y = Math.PI; 
            if (gltf.animations.length > 0) {
                let mixer = new THREE.AnimationMixer(myBody);
                mixer.clipAction(gltf.animations[0]).play();
                mixers.push(mixer);
            }
            myBody.visible = false; 
            playerContainer.add(myBody); 
        });

        const gunGroup = new THREE.Group();
        camera.add(gunGroup); 
        let loadedGunModel = null;
        gltfLoader.load('pistol__usp_no_silencer_weapon_model_cs2.glb?v=2', (gltf) => {
            loadedGunModel = gltf.scene;
            loadedGunModel.scale.set(1.5, 1.5, 1.5); 
            loadedGunModel.position.set(0.35, -0.35, -0.55); 
            loadedGunModel.rotation.y = Math.PI + 0.08; 
            gunGroup.add(loadedGunModel);
        });

        signInAnonymously(auth);
        onAuthStateChanged(auth, (user) => {
            if (user) {
                myUid = user.uid;
                const myRef = ref(database, `players/${myUid}`);
                onDisconnect(myRef).remove();
                onValue(ref(database, 'players'), (snapshot) => {
                    if (isKicked) return;
                    const data = snapshot.val() || {};
                    let onlineCount = 0;
                    for (let uid in data) {
                        onlineCount++;
                        if (uid === myUid) {
                            document.getElementById('health-display').innerText = `HP: ${data[uid].health || 100}`;
                            if(data[uid].health <= 0) {
                                playerContainer.position.set(2, 1.25, 15);
                                update(myRef, { health: 100 });
                            }
                            continue;
                        }
                        if (!remotePlayers[uid]) {
                            remotePlayers[uid] = "loading";
                            gltfLoader.load('dancing_banana.glb?v=2', (gltf) => {
                                let model = gltf.scene; model.scale.set(2.5, 2.5, 2.5);
                                scene.add(model);
                                remotePlayers[uid] = { model, targetPos: new THREE.Vector3(), targetRotY: 0 };
                            });
                        } else if (remotePlayers[uid] !== "loading") {
                            remotePlayers[uid].targetPos.set(data[uid].x, data[uid].y - 1.25, data[uid].z);
                            remotePlayers[uid].targetRotY = data[uid].rotY + Math.PI;
                        }
                    }
                    document.getElementById('online-count').innerText = `在线人数: ${onlineCount}`;
                });
            }
        });

        // 按钮监听（带重置AFK）
        document.getElementById('btn-view').onclick = () => { resetAFK(); isTPS = !isTPS; myBody.visible = isTPS; if(loadedGunModel) loadedGunModel.visible = !isTPS; camera.position.set(0, isTPS?1.5:0, isTPS?4.5:0); };
        document.getElementById('btn-jump').onclick = () => { resetAFK(); if(isGrounded) yVelocity = 0.15; };

        // 摇杆与射击逻辑... (由于篇幅限制，此处保留核心逻辑，与你之前的代码一致)
        let moveInput = { x: 0, y: 0 };
        let touches = { left: null, right: null };
        let yVelocity = 0, isGrounded = false;
        const downRaycaster = new THREE.Raycaster();

        document.addEventListener('touchstart', (e) => {
            if(!gameStarted) return;
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2) {
                    touches.left = { id: t.identifier, startX: t.clientX, startY: t.clientY };
                    document.getElementById('joystick-base').style.display = 'block';
                    document.getElementById('joystick-base').style.left = t.clientX + 'px';
                    document.getElementById('joystick-base').style.top = t.clientY + 'px';
                } else {
                    touches.right = { id: t.identifier, lastX: t.clientX, lastY: t.clientY, isTap: true };
                }
            }
        });

        document.addEventListener('touchmove', (e) => {
            resetAFK();
            for (let t of e.changedTouches) {
                if (touches.left && t.identifier === touches.left.id) {
                    let dx = t.clientX - touches.left.startX;
                    let dy = t.clientY - touches.left.startY;
                    moveInput.x = (dx/50)*0.15; moveInput.y = (dy/50)*0.15;
                    document.getElementById('joystick-stick').style.transform = `translate(calc(-50% + ${Math.max(-50,Math.min(50,dx))}px), calc(-50% + ${Math.max(-50,Math.min(50,dy))}px))`;
                }
                if (touches.right && t.identifier === touches.right.id) {
                    touches.right.isTap = false;
                    playerContainer.rotation.y -= (t.clientX - touches.right.lastX) * 0.005;
                    camera.rotation.x -= (t.clientY - touches.right.lastY) * 0.005;
                    touches.right.lastX = t.clientX; touches.right.lastY = t.clientY;
                }
            }
        });

        document.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (touches.left && t.identifier === touches.left.id) { touches.left = null; moveInput = {x:0,y:0}; document.getElementById('joystick-base').style.display = 'none'; }
                if (touches.right && t.identifier === touches.right.id) { if(touches.right.isTap) shoot(); touches.right = null; }
            }
        });

        function shoot() {
            resetAFK();
            // 简单的射击闪烁反馈
            document.getElementById('muzzle-flash').style.opacity = '1';
            setTimeout(()=>document.getElementById('muzzle-flash').style.opacity = '0', 50);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            mixers.forEach(m => m.update(delta));

            if (gameStarted && !isKicked) {
                let inactive = Date.now() - lastActionTime;
                if (inactive > 30000) {
                    isKicked = true;
                    remove(ref(database, `players/${myUid}`));
                    document.getElementById('kick-screen').style.display = 'flex';
                } else if (inactive > 20000) {
                    document.getElementById('afk-warning').style.display = 'block';
                    document.getElementById('afk-countdown').innerText = Math.ceil((30000-inactive)/1000);
                }

                // 物理与同步
                yVelocity -= 0.012;
                playerContainer.position.y += yVelocity;
                playerContainer.translateZ(moveInput.y);
                playerContainer.translateX(moveInput.x);

                if (mapMesh) {
                    downRaycaster.set(playerContainer.position.clone().add(new THREE.Vector3(0,0.5,0)), new THREE.Vector3(0,-1,0));
                    let intersects = downRaycaster.intersectObject(mapMesh, true);
                    if (intersects.length > 0 && playerContainer.position.y <= intersects[0].point.y + 1.25) {
                        playerContainer.position.y = intersects[0].point.y + 1.25;
                        yVelocity = 0; isGrounded = true;
                    } else isGrounded = false;
                }

                if (myUid) update(ref(database, `players/${myUid}`), { x: playerContainer.position.x, y: playerContainer.position.y, z: playerContainer.position.z, rotY: playerContainer.rotation.y });
            }

            for(let uid in remotePlayers) {
                if(remotePlayers[uid] !== "loading") {
                    remotePlayers[uid].model.position.lerp(remotePlayers[uid].targetPos, 0.2);
                    remotePlayers[uid].model.rotation.y = remotePlayers[uid].targetRotY;
                }
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
