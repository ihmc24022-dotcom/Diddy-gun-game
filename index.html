<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Web CSGO - Giant Map Flight Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        
        /* 准星 */
        #crosshair { position: fixed; top: 50%; left: 50%; width: 4px; height: 4px; background: #00ff00; transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; z-index: 10; box-shadow: 0 0 5px #00ff00; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ff00; pointer-events: none; }
        #crosshair::before { top: -8px; left: 1px; width: 2px; height: 20px; }
        #crosshair::after { left: -8px; top: 1px; width: 20px; height: 2px; }
        
        /* 顶部提示语 */
        #ui { position: fixed; top: 10px; left: 10px; color: #00ff00; pointer-events: none; z-index: 10; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; font-size: 14px; text-shadow: 1px 1px 0 #000; font-weight: bold; }
        
        /* 坐标显示器 */
        #coords-display { position: fixed; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.7); border: 1px solid #00ff00; color: #00ff00; padding: 8px 15px; border-radius: 5px; font-family: monospace; font-size: 16px; font-weight: bold; pointer-events: none; z-index: 20; }

        /* 队伍/传送按钮 */
        #team-select { position: fixed; top: 50px; left: 10px; z-index: 15; display: flex; gap: 10px; }
        button { padding: 10px 15px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 5px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        #btn-red { background-color: #d32f2f; }
        #btn-blue { background-color: #1976d2; }

        /* 虚拟摇杆 */
        #joystick-base { position: fixed; width: 100px; height: 100px; background: rgba(0, 0, 0, 0.4); border: 2px solid rgba(0, 0, 0, 0.7); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; display: none; z-index: 30; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: rgba(0, 0, 0, 0.9); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px rgba(0,0,0,0.8); pointer-events: none; }

        /* 飞行垂直控制按钮 */
        .flight-btn {
            position: fixed;
            right: 30px;
            width: 60px;
            height: 60px;
            background: rgba(0, 150, 255, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            color: white;
            font-size: 14px;
            font-weight: bold;
            z-index: 30;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .flight-btn:active { background: rgba(0, 150, 255, 0.9); }
        #btn-up { bottom: 110px; }
        #btn-down { bottom: 30px; }

        /* 加载界面与开火特效 */
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ffce00; font-size: 24px; font-weight: bold; z-index: 20; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        #muzzle-flash { position: fixed; top: 50%; left: 50%; width: 100vw; height: 100vh; background: rgba(255, 200, 0, 0.2); transform: translate(-50%, -50%); pointer-events: none; opacity: 0; transition: opacity 0.05s; z-index: 5; }
    </style>
</head>
<body>
    <div id="ui">🚀 飞行模式已激活！地图已放大20倍！</div>
    
    <div id="coords-display">X: 0.00 | Y: 0.00</div>

    <div id="team-select">
        <button id="btn-red">传送点 A</button>
        <button id="btn-blue">传送点 B</button>
    </div>

    <div id="btn-up" class="flight-btn">UP</div>
    <div id="btn-down" class="flight-btn">DOWN</div>

    <div id="joystick-base">
        <div id="joystick-stick"></div>
    </div>

    <div id="loading">Map Loading 0%</div>
    <div id="crosshair"></div>
    <div id="muzzle-flash"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // 1. 场景初始化
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // 天蓝色背景
        scene.fog = new THREE.Fog(0x87ceeb, 10, 1000); // 雾气距离稍微调远一点适应大地图

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 50, 0); // 初始位置调得更高一点
        camera.rotation.order = 'YXZ'; 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. 光照设置
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0); 
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); 
        dirLight.position.set(100, 200, 50);
        scene.add(dirLight);

        // 3. 加载 GLB 地图
        const gltfLoader = new THREE.GLTFLoader();
        const loadingUI = document.getElementById('loading');
        const mapUrl = 'de_dust2_-_cs_map.glb'; 

        gltfLoader.load(
            mapUrl,
            function (gltf) {
                loadingUI.style.display = 'none';
                const object = gltf.scene;
                // 👇 关键修改：放大 20 倍 (0.02 * 20 = 0.4) 👇
                object.scale.set(0.4, 0.4, 0.4); 
                object.position.set(0, 0, 0);
                scene.add(object);
            },
            function (xhr) {
                if (xhr.lengthComputable) {
                    loadingUI.innerText = '加载地图 ' + Math.round(xhr.loaded / xhr.total * 100) + '%';
                } else {
                    const mb = (xhr.loaded / 1024 / 1024).toFixed(1);
                    loadingUI.innerText = `加载中... ${mb} MB`;
                }
            },
            function (error) { 
                console.error("加载失败:", error);
                loadingUI.innerText = '加载失败!'; 
                loadingUI.style.color = 'red'; 
            }
        );

        // 4. 枪支模型
        const gunGroup = new THREE.Group();
        const gunMesh = new THREE.Mesh(
            new THREE.BoxGeometry(0.1, 0.15, 0.6),
            new THREE.MeshStandardMaterial({ color: 0x222222 })
        );
        gunMesh.position.set(0.3, -0.2, -0.5); 
        gunGroup.add(gunMesh);
        camera.add(gunGroup);
        scene.add(camera);

        // 5. 传送点按钮逻辑 (可以根据放大的地图重新调整这里的坐标)
        document.getElementById('btn-red').addEventListener('click', () => { camera.position.set(220, 100, 80); });
        document.getElementById('btn-blue').addEventListener('click', () => { camera.position.set(40, 100, 300); });

        // 6. 控制变量
        const joyBase = document.getElementById('joystick-base');
        const joyStick = document.getElementById('joystick-stick');
        const coordsDisplay = document.getElementById('coords-display'); 
        const joyMaxRadius = 50; 

        let moveInput = { x: 0, y: 0 };
        let touches = { left: null, right: null };
        let isShooting = false;
        
        let isFlyingUp = false;
        let isFlyingDown = false;
        const flySpeed = 0.8; // 地图变大了，飞行速度也稍微调快一点

        // 7. 垂直升降按钮事件
        const btnUp = document.getElementById('btn-up');
        const btnDown = document.getElementById('btn-down');

        btnUp.addEventListener('touchstart', (e) => { e.preventDefault(); isFlyingUp = true; });
        btnUp.addEventListener('touchend', (e) => { e.preventDefault(); isFlyingUp = false; });
        btnUp.addEventListener('mousedown', () => { isFlyingUp = true; });
        btnUp.addEventListener('mouseup', () => { isFlyingUp = false; });
        btnUp.addEventListener('mouseleave', () => { isFlyingUp = false; });

        btnDown.addEventListener('touchstart', (e) => { e.preventDefault(); isFlyingDown = true; });
        btnDown.addEventListener('touchend', (e) => { e.preventDefault(); isFlyingDown = false; });
        btnDown.addEventListener('mousedown', () => { isFlyingDown = true; });
        btnDown.addEventListener('mouseup', () => { isFlyingDown = false; });
        btnDown.addEventListener('mouseleave', () => { isFlyingDown = false; });

        // 8. 触摸控制 (移动与视角)
        document.addEventListener('touchstart', (e) => {
            if(e.target.tagName === 'DIV' && e.target.classList.contains('flight-btn')) return;
            if(e.target.tagName === 'BUTTON') return; 
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2) {
                    touches.left = { id: t.identifier, startX: t.clientX, startY: t.clientY };
                    joyBase.style.display = 'block';
                    joyBase.style.left = t.clientX + 'px';
                    joyBase.style.top = t.clientY + 'px';
                    joyStick.style.transform = `translate(-50%, -50%)`;
                } else {
                    touches.right = { id: t.identifier, lastX: t.clientX, lastY: t.clientY, isTap: true };
                }
            }
        });

        document.addEventListener('touchmove', (e) => {
            for (let t of e.changedTouches) {
                if (touches.left && t.identifier === touches.left.id) {
                    let deltaX = t.clientX - touches.left.startX;
                    let deltaY = t.clientY - touches.left.startY;
                    const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                    if (distance > joyMaxRadius) {
                        deltaX = (deltaX / distance) * joyMaxRadius;
                        deltaY = (deltaY / distance) * joyMaxRadius;
                    }
                    joyStick.style.transform = `translate(calc(-50% + ${deltaX}px), calc(-50% + ${deltaY}px))`;
                    
                    // 移动速度也适当调快以适应大地图
                    moveInput.x = (deltaX / joyMaxRadius) * 1.0;
                    moveInput.y = (deltaY / joyMaxRadius) * 1.0;
                }
                if (touches.right && t.identifier === touches.right.id) {
                    touches.right.isTap = false; 
                    camera.rotation.y -= (t.clientX - touches.right.lastX) * 0.005;
                    camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x - (t.clientY - touches.right.lastY) * 0.005));
                    touches.right.lastX = t.clientX;
                    touches.right.lastY = t.clientY;
                }
            }
        });

        document.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (touches.left && t.identifier === touches.left.id) { 
                    touches.left = null; 
                    moveInput = { x: 0, y: 0 }; 
                    joyBase.style.display = 'none';
                }
                if (touches.right && t.identifier === touches.right.id) {
                    if (touches.right.isTap) shoot();
                    touches.right = null;
                }
            }
        });

        // 9. 射击逻辑
        const flashUI = document.getElementById('muzzle-flash');
        function shoot() {
            if (isShooting) return;
            isShooting = true;
            gunMesh.position.z = -0.3; // 后坐力表现
            flashUI.style.opacity = '1';
            setTimeout(() => { flashUI.style.opacity = '0'; }, 50);
            setTimeout(() => { isShooting = false; }, 150);
        }

        // 10. 主循环
        function animate() {
            requestAnimationFrame(animate);

            // 枪支回弹
            if (!isShooting) gunMesh.position.z += (-0.5 - gunMesh.position.z) * 0.2;

            // 飞行移动 (直接根据摄像机朝向进行位移，无视碰撞)
            if (touches.left) {
                camera.translateZ(moveInput.y);
                camera.translateX(moveInput.x);
            }

            // 垂直升降
            if (isFlyingUp) camera.position.y += flySpeed;
            if (isFlyingDown) camera.position.y -= flySpeed;

            // UI 更新
            coordsDisplay.innerText = `X: ${camera.position.x.toFixed(1)} | 高度: ${camera.position.y.toFixed(1)}`;
            
            renderer.render(scene, camera);
        }

        // 11. 窗口缩放适配
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 启动！
        animate();
    </script>
</body>
</html>
