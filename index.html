<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Web CSGO - Dust 2 (GPS Mode)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 4px; height: 4px; background: #00ff00; transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; z-index: 10; box-shadow: 0 0 5px #00ff00; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ff00; pointer-events: none; }
        #crosshair::before { top: -8px; left: 1px; width: 2px; height: 20px; }
        #crosshair::after { left: -8px; top: 1px; width: 20px; height: 2px; }
        #ui { position: fixed; top: 10px; left: 10px; color: white; pointer-events: none; z-index: 10; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; font-size: 14px; text-shadow: 1px 1px 0 #000; }
        
        /* 👇 新增：GPS 坐标显示器 👇 */
        #coords { position: fixed; top: 40px; left: 10px; color: #ff4444; pointer-events: none; z-index: 10; background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 5px; font-size: 14px; font-weight: bold; font-family: monospace; }
        
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ffce00; font-size: 24px; font-weight: bold; z-index: 20; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        #muzzle-flash { position: fixed; top: 50%; left: 50%; width: 100vw; height: 100vh; background: rgba(255, 200, 0, 0.2); transform: translate(-50%, -50%); pointer-events: none; opacity: 0; transition: opacity 0.05s; z-index: 5; }
    </style>
</head>
<body>
    <div id="ui">【幽灵找点模式】穿墙找到好位置，记下坐标！</div>
    <div id="coords">X: 0.00 | Y: 1.25 | Z: 0.00</div>
    <div id="loading">Map Loading 0%</div>
    <div id="crosshair"></div>
    <div id="muzzle-flash"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); 
        scene.fog = new THREE.Fog(0x87ceeb, 10, 300); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        
        // 🎯 目标修改点：找到满意的坐标后，把数字填进这里
        // 如果你觉得出生点太矮或太高，可以调整中间的 Y 值 (目前是 1.25)
        camera.position.set(0, 1.25, 0); 
        camera.rotation.order = 'YXZ'; 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7); 
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); 
        dirLight.position.set(100, 200, 50);
        scene.add(dirLight);

        let mapMesh = null;
        const raycaster = new THREE.Raycaster();
        const objLoader = new THREE.OBJLoader();
        const loadingUI = document.getElementById('loading');
        const mapUrl = 'de_dust2.obj'; 

        objLoader.load(
            mapUrl,
            function (object) {
                loadingUI.style.display = 'none';
                
                const sandMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xd2b48c, roughness: 0.9, side: THREE.DoubleSide 
                });
                object.traverse(function (child) {
                    if (child.isMesh) child.material = sandMaterial;
                });

                object.scale.set(0.02, 0.02, 0.02); 
                object.position.set(0, 0, 0);
                object.rotation.x = -Math.PI / 2; 

                scene.add(object);
                mapMesh = object; 
            },
            function (xhr) {
                if (xhr.lengthComputable) {
                    loadingUI.innerText = '加载骨架 ' + Math.round(xhr.loaded / xhr.total * 100) + '%';
                }
            },
            function (error) { loadingUI.innerText = '加载失败!'; loadingUI.style.color = 'red'; }
        );

        const gunGroup = new THREE.Group();
        const gunMesh = new THREE.Mesh(
            new THREE.BoxGeometry(0.1, 0.15, 0.6),
            new THREE.MeshStandardMaterial({ color: 0x222222 })
        );
        gunMesh.position.set(0.3, -0.2, -0.5); 
        gunGroup.add(gunMesh);
        camera.add(gunGroup);
        scene.add(camera);

        let moveInput = { x: 0, y: 0 };
        let touches = { left: null, right: null };
        let isShooting = false;

        document.addEventListener('touchstart', (e) => {
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2) touches.left = { id: t.identifier, startX: t.clientX, startY: t.clientY };
                else touches.right = { id: t.identifier, lastX: t.clientX, lastY: t.clientY, isTap: true };
            }
        });

        document.addEventListener('touchmove', (e) => {
            for (let t of e.changedTouches) {
                if (touches.left && t.identifier === touches.left.id) {
                    moveInput.x = (t.clientX - touches.left.startX) * 0.02;
                    moveInput.y = (t.clientY - touches.left.startY) * 0.02;
                }
                if (touches.right && t.identifier === touches.right.id) {
                    touches.right.isTap = false; 
                    camera.rotation.y -= (t.clientX - touches.right.lastX) * 0.005;
                    camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x - (t.clientY - touches.right.lastY) * 0.005));
                    touches.right.lastX = t.clientX;
                    touches.right.lastY = t.clientY;
                }
            }
        });

        document.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (touches.left && t.identifier === touches.left.id) { touches.left = null; moveInput = { x: 0, y: 0 }; }
                if (touches.right && t.identifier === touches.right.id) {
                    if (touches.right.isTap) shoot();
                    touches.right = null;
                }
            }
        });

        const flashUI = document.getElementById('muzzle-flash');
        function shoot() {
            if (isShooting) return;
            isShooting = true;
            gunMesh.position.z = -0.3; 
            flashUI.style.opacity = '1';
            setTimeout(() => { flashUI.style.opacity = '0'; }, 50);
            setTimeout(() => { isShooting = false; }, 150);
        }

        function checkCollision(startPos, endPos) {
            if (!mapMesh) return false; 
            const checkStart = startPos.clone(); checkStart.y = 0.5; 
            const checkEnd = endPos.clone(); checkEnd.y = 0.5;
            const direction = new THREE.Vector3().subVectors(checkEnd, checkStart);
            const distance = direction.length();
            if (distance === 0) return false;
            direction.normalize(); 
            raycaster.set(checkStart, direction);
            const intersects = raycaster.intersectObject(mapMesh, true);
            if (intersects.length > 0 && intersects[0].distance < distance + 0.2) return true; 
            return false; 
        }

        const coordsUI = document.getElementById('coords');

        function animate() {
            requestAnimationFrame(animate);

            if (!isShooting) gunMesh.position.z += (-0.5 - gunMesh.position.z) * 0.2;

            if (touches.left) {
                // 加快一点速度方便你找路
                const speedX = Math.max(-0.4, Math.min(0.4, moveInput.x));
                const speedY = Math.max(-0.4, Math.min(0.4, moveInput.y));
                
                let oldPosition = camera.position.clone();

                camera.translateZ(speedY);
                // ⚠️ 为了方便找出生点，这里暂时关掉了 Z 轴碰撞！
                // 找到点之后，把下面这行开头的双斜杠删掉：
                // if (checkCollision(oldPosition, camera.position)) camera.position.copy(oldPosition); 
                
                oldPosition = camera.position.clone();

                camera.translateX(speedX);
                // ⚠️ 为了方便找出生点，这里暂时关掉了 X 轴碰撞！
                // 找到点之后，把下面这行开头的双斜杠删掉：
                // if (checkCollision(oldPosition, camera.position)) camera.position.copy(oldPosition); 

                // 强制保持身高
                camera.position.y = 1.25; 
            }

            // 更新左上角的 GPS 坐标显示
            coordsUI.innerText = `X: ${camera.position.x.toFixed(2)} | Y: ${camera.position.y.toFixed(2)} | Z: ${camera.position.z.toFixed(2)}`;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
