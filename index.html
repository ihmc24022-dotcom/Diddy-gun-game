<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Web CSGO - Dust 2 Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 4px; height: 4px; background: #00ff00; transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; z-index: 10; box-shadow: 0 0 5px #00ff00; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ff00; pointer-events: none; }
        #crosshair::before { top: -8px; left: 1px; width: 2px; height: 20px; }
        #crosshair::after { left: -8px; top: 1px; width: 20px; height: 2px; }
        
        #ui { position: fixed; top: 10px; left: 10px; color: #0f0; pointer-events: none; z-index: 10; background: rgba(0,0,0,0.8); padding: 8px 12px; border-radius: 5px; font-size: 14px; border: 1px solid #0f0; }
        
        #team-select { position: fixed; top: 60px; left: 10px; z-index: 15; display: flex; gap: 10px; }
        button { padding: 10px 15px; font-size: 14px; font-weight: bold; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #btn-red { background: #d32f2f; }
        #btn-blue { background: #1976d2; }

        #coords-display { position: fixed; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.7); color: #00ff00; padding: 8px 15px; border-radius: 5px; font-family: monospace; z-index: 20; }

        #joystick-base { position: fixed; width: 100px; height: 100px; background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; display: none; z-index: 30; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: rgba(255, 255, 255, 0.5); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }

        #btn-jump { position: fixed; bottom: 40px; right: 40px; width: 70px; height: 70px; background: rgba(0, 0, 0, 0.5); border: 2px solid white; border-radius: 50%; color: white; z-index: 30; }

        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ffce00; font-size: 24px; font-weight: bold; z-index: 100; text-align: center; }
        #muzzle-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.1); pointer-events: none; opacity: 0; z-index: 5; }
    </style>
</head>
<body>
    <div id="ui">系统状态: 初始化物理核心...</div>
    <div id="coords-display">POS: 0, 0</div>
    <div id="team-select">
        <button id="btn-red">T 阵营</button>
        <button id="btn-blue">CT 阵营</button>
    </div>
    <button id="btn-jump">JUMP</button>
    <div id="joystick-base"><div id="joystick-stick"></div></div>
    <div id="loading">正在载入地图资源...<br>0%</div>
    <div id="crosshair"></div>
    <div id="muzzle-flash"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
        camera.rotation.order = 'YXZ';
        
        // 🟢 CT初始出生点稍微抬高一点点，防止卡进地板
        const CT_SPAWN = { x: 2, y: 5, z: 15 }; 
        const T_SPAWN = { x: 11, y: 5, z: 4 };
        camera.position.set(CT_SPAWN.x, CT_SPAWN.y, CT_SPAWN.z);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(50, 100, 50);
        scene.add(dirLight);

        let mapMesh = null;
        let isPhysicsReady = false; 
        const raycaster = new THREE.Raycaster();
        const downRaycaster = new THREE.Raycaster();

        const objLoader = new THREE.OBJLoader();
        const loadingUI = document.getElementById('loading');
        const statusUI = document.getElementById('ui');

        objLoader.load('de_dust2.obj', 
            (object) => {
                loadingUI.style.display = 'none';
                const mat = new THREE.MeshStandardMaterial({ color: 0xd2b48c, roughness: 1, side: THREE.DoubleSide });
                object.traverse(c => { if(c.isMesh) c.material = mat; });
                object.scale.set(0.02, 0.02, 0.02);
                object.rotation.x = -Math.PI / 2;
                scene.add(object);
                mapMesh = object;
                
                // 🟢 核心修复：加载完成后，延迟半秒开启物理，并强行对齐地面
                setTimeout(() => {
                    snapToGround();
                    isPhysicsReady = true;
                    statusUI.innerText = "状态: 物理已激活";
                }, 500);
            },
            (xhr) => { loadingUI.innerText = `载入中: ${Math.round(xhr.loaded/xhr.total*100)}%`; }
        );

        function snapToGround() {
            if(!mapMesh) return;
            // 从很高的地方往下打射线，强制寻找第一块地板
            downRaycaster.set(new THREE.Vector3(camera.position.x, 20, camera.position.z), new THREE.Vector3(0, -1, 0));
            const hits = downRaycaster.intersectObject(mapMesh, true);
            if(hits.length > 0) {
                camera.position.y = hits[0].point.y + 1.25;
                yVelocity = 0;
            }
        }

        const gunMesh = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.4), new THREE.MeshStandardMaterial({color: 0x333}));
        gunMesh.position.set(0.2, -0.2, -0.4);
        camera.add(gunMesh);
        scene.add(camera);

        document.getElementById('btn-red').onclick = () => { camera.position.set(T_SPAWN.x, T_SPAWN.y, T_SPAWN.z); yVelocity = 0; snapToGround(); };
        document.getElementById('btn-blue').onclick = () => { camera.position.set(CT_SPAWN.x, CT_SPAWN.y, CT_SPAWN.z); yVelocity = 0; snapToGround(); };

        let yVelocity = 0;
        let isGrounded = false;
        const gravity = -0.008; 
        const jumpStrength = 0.12;
        let moveInput = { x: 0, y: 0 };
        let touches = { left: null, right: null };

        // 简化的触摸逻辑
        window.ontouchstart = (e) => {
            for(let t of e.changedTouches) {
                if(t.clientX < window.innerWidth/2) {
                    touches.left = t;
                    document.getElementById('joystick-base').style.display = 'block';
                    document.getElementById('joystick-base').style.left = t.clientX+'px';
                    document.getElementById('joystick-base').style.top = t.clientY+'px';
                } else { touches.right = t; }
            }
        };
        window.ontouchmove = (e) => {
            for(let t of e.changedTouches) {
                if(touches.left && t.identifier === touches.left.identifier) {
                    let dx = t.clientX - touches.left.clientX;
                    let dy = t.clientY - touches.left.clientY;
                    moveInput.x = Math.max(-1, Math.min(1, dx/50)) * 0.12;
                    moveInput.y = Math.max(-1, Math.min(1, dy/50)) * 0.12;
                    document.getElementById('joystick-stick').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                }
                if(touches.right && t.identifier === touches.right.identifier) {
                    camera.rotation.y -= (t.clientX - touches.right.clientX) * 0.006;
                    camera.rotation.x -= (t.clientY - touches.right.clientY) * 0.006;
                    camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
                    touches.right = t;
                }
            }
        };
        window.ontouchend = (e) => {
            for(let t of e.changedTouches) {
                if(touches.left && t.identifier === touches.left.identifier) {
                    touches.left = null; moveInput = {x:0, y:0};
                    document.getElementById('joystick-base').style.display = 'none';
                }
                if(touches.right && t.identifier === touches.right.identifier) {
                    if(Math.abs(t.clientX - touches.right.clientX) < 5) shoot();
                    touches.right = null;
                }
            }
        };
        document.getElementById('btn-jump').ontouchstart = (e) => {
            e.preventDefault();
            if(isGrounded) { yVelocity = jumpStrength; isGrounded = false; }
        };

        function shoot() {
            const f = document.getElementById('muzzle-flash');
            f.style.opacity = '1'; setTimeout(()=>f.style.opacity='0', 50);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (isPhysicsReady && mapMesh) {
                // 1. 处理水平移动和碰撞
                let oldP = camera.position.clone();
                camera.translateZ(moveInput.y);
                camera.translateX(moveInput.x);
                
                // 水平碰撞简单防止穿墙
                raycaster.set(new THREE.Vector3(oldP.x, camera.position.y-0.5, oldP.z), 
                              new THREE.Vector3(camera.position.x-oldP.x, 0, camera.position.z-oldP.z).normalize());
                if(raycaster.intersectObject(mapMesh, true).length > 0 && raycaster.intersectObject(mapMesh, true)[0].distance < 0.5) {
                    camera.position.x = oldP.x; camera.position.z = oldP.z;
                }

                // 2. 处理重力
                yVelocity += gravity;
                camera.position.y += yVelocity;

                // 3. 增强型地面检测 (上下双向探测)
                const checkOrigin = camera.position.clone().setY(camera.position.y + 0.5); // 从腰部往下打
                downRaycaster.set(checkOrigin, new THREE.Vector3(0, -1, 0));
                const hits = downRaycaster.intersectObject(mapMesh, true);
                
                let foundGround = false;
                for(let h of hits) {
                    if(h.face.normal.y > 0.5) { // 必须是相对平坦的面
                        const dist = (camera.position.y - h.point.y);
                        // 如果距离地板很近，或者已经陷进去了（dist < 0）
                        if(dist < 1.3) {
                            camera.position.y = h.point.y + 1.25;
                            yVelocity = 0;
                            isGrounded = true;
                            foundGround = true;
                            break;
                        }
                    }
                }
                if(!foundGround) isGrounded = false;

                // 虚空保险
                if(camera.position.y < -20) {
                    camera.position.set(CT_SPAWN.x, CT_SPAWN.y, CT_SPAWN.z);
                    yVelocity = 0;
                    snapToGround();
                }
            }

            document.getElementById('coords-display').innerText = `X:${camera.position.x.toFixed(1)} Z:${camera.position.z.toFixed(1)}`;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
