<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Web CSGO - USP Final Version</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        
        /* 准星 */
        #crosshair { position: fixed; top: 50%; left: 50%; width: 4px; height: 4px; background: #00ff00; transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; z-index: 10; box-shadow: 0 0 5px #00ff00; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ff00; pointer-events: none; }
        #crosshair::before { top: -8px; left: 1px; width: 2px; height: 20px; }
        #crosshair::after { left: -8px; top: 1px; width: 20px; height: 2px; }
        
        #ui { position: fixed; top: 10px; left: 10px; color: #00ff00; pointer-events: none; z-index: 10; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; font-size: 14px; text-shadow: 1px 1px 0 #000; font-weight: bold; }
        
        #coords-display { position: fixed; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.7); border: 1px solid #00ff00; color: #00ff00; padding: 8px 15px; border-radius: 5px; font-family: monospace; font-size: 16px; font-weight: bold; pointer-events: none; z-index: 20; }

        #team-select { position: fixed; top: 50px; left: 10px; z-index: 15; display: flex; gap: 10px; }
        button { padding: 10px 15px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 5px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        #btn-red { background-color: #d32f2f; }
        #btn-blue { background-color: #1976d2; }

        #joystick-base { position: fixed; width: 100px; height: 100px; background: rgba(0, 0, 0, 0.4); border: 2px solid rgba(0, 0, 0, 0.7); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; display: none; z-index: 30; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: rgba(0, 0, 0, 0.9); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px rgba(0,0,0,0.8); pointer-events: none; }

        .flight-btn { position: fixed; right: 30px; width: 60px; height: 60px; background: rgba(0, 150, 255, 0.5); border: 2px solid rgba(255, 255, 255, 0.7); border-radius: 50%; color: white; font-size: 14px; font-weight: bold; z-index: 30; cursor: pointer; user-select: none; -webkit-user-select: none; touch-action: manipulation; display: flex; justify-content: center; align-items: center; }
        .flight-btn:active { background: rgba(0, 150, 255, 0.9); }
        #btn-up { bottom: 110px; }
        #btn-down { bottom: 30px; }

        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ffce00; font-size: 24px; font-weight: bold; z-index: 20; pointer-events: none; text-shadow: 2px 2px 4px #000; text-align: center; }
        #muzzle-flash { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255, 200, 0, 0.2); pointer-events: none; opacity: 0; transition: opacity 0.05s; z-index: 5; }
    </style>
</head>
<body>
    <div id="ui">🔫 USP 测试版 (彩色地图)</div>
    <div id="coords-display">X: 0 | 高度: 0</div>

    <div id="team-select">
        <button id="btn-red">传送点 A</button>
        <button id="btn-blue">传送点 B</button>
    </div>

    <div id="btn-up" class="flight-btn">UP</div>
    <div id="btn-down" class="flight-btn">DOWN</div>

    <div id="joystick-base">
        <div id="joystick-stick"></div>
    </div>

    <div id="loading">正在处理彩色地图...<br><span id="load-progress">请稍后</span></div>
    <div id="crosshair"></div>
    <div id="muzzle-flash"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>

    <script>
        // --- 基础场景 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 50, 0); 
        camera.rotation.order = 'YXZ'; 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const pointLight = new THREE.PointLight(0xffffff, 1);
        camera.add(pointLight);
        scene.add(camera);

        let modelsLoaded = 0;
        function checkLoadingStatus() {
            modelsLoaded++;
            if(modelsLoaded >= 1) {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // 1. 加载并修正 OBJ 地图 (角度修正)
        const objLoader = new THREE.OBJLoader();
        objLoader.load('de_dust2.obj', function (obj) {
            obj.traverse(function (child) {
                if (child.isMesh) {
                    child.material = new THREE.MeshStandardMaterial({
                        color: Math.random() * 0xffffff, 
                        metalness: 0.3,
                        roughness: 0.8
                    });
                }
            });

            // ⚠️ 修正地图角度：
            // 如果地图是立着的，取消下面代码的注释
            obj.rotation.x = -Math.PI / 2; 

            obj.scale.set(0.4, 0.4, 0.4); 
            scene.add(obj);
            checkLoadingStatus();
        });

        // 2. 加载 USP 武器 (GLB)
        const gltfLoader = new THREE.GLTFLoader();
        const gunGroup = new THREE.Group();
        camera.add(gunGroup);
        
        let loadedGunModel = null;
        let defaultGunZ = -0.4; 

        gltfLoader.load('pistol__usp_no_silencer_weapon_model_cs2.glb', function (gltf) {
            loadedGunModel = gltf.scene;
            loadedGunModel.scale.set(1.5, 1.5, 1.5); 
            loadedGunModel.position.set(0.2, -0.15, defaultGunZ); 
            loadedGunModel.rotation.y = Math.PI; 
            gunGroup.add(loadedGunModel);
            checkLoadingStatus();
        });

        // --- 交互与控制逻辑 (完整保留) ---
        document.getElementById('btn-red').addEventListener('click', () => { camera.position.set(220, 50, 80); });
        document.getElementById('btn-blue').addEventListener('click', () => { camera.position.set(40, 50, 300); });

        const joyBase = document.getElementById('joystick-base');
        const joyStick = document.getElementById('joystick-stick');
        const coordsDisplay = document.getElementById('coords-display'); 
        const joyMaxRadius = 50; 

        let moveInput = { x: 0, y: 0 };
        let touches = { left: null, right: null };
        let isShooting = false;
        let isFlyingUp = false;
        let isFlyingDown = false;
        const flySpeed = 1.0; 

        const btnUp = document.getElementById('btn-up');
        const btnDown = document.getElementById('btn-down');
        btnUp.addEventListener('touchstart', (e) => { e.preventDefault(); isFlyingUp = true; });
        btnUp.addEventListener('touchend', (e) => { e.preventDefault(); isFlyingUp = false; });
        btnDown.addEventListener('touchstart', (e) => { e.preventDefault(); isFlyingDown = true; });
        btnDown.addEventListener('touchend', (e) => { e.preventDefault(); isFlyingDown = false; });

        document.addEventListener('touchstart', (e) => {
            if(e.target.tagName === 'BUTTON' || e.target.classList.contains('flight-btn')) return;
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2) {
                    touches.left = { id: t.identifier, startX: t.clientX, startY: t.clientY };
                    joyBase.style.display = 'block';
                    joyBase.style.left = t.clientX + 'px';
                    joyBase.style.top = t.clientY + 'px';
                } else {
                    touches.right = { id: t.identifier, lastX: t.clientX, lastY: t.clientY, isTap: true };
                }
            }
        }, {passive: false});

        document.addEventListener('touchmove', (e) => {
            for (let t of e.changedTouches) {
                if (touches.left && t.identifier === touches.left.id) {
                    let deltaX = t.clientX - touches.left.startX;
                    let deltaY = t.clientY - touches.left.startY;
                    const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                    if (distance > joyMaxRadius) {
                        deltaX = (deltaX / distance) * joyMaxRadius;
                        deltaY = (deltaY / distance) * joyMaxRadius;
                    }
                    joyStick.style.transform = `translate(calc(-50% + ${deltaX}px), calc(-50% + ${deltaY}px))`;
                    moveInput.x = (deltaX / joyMaxRadius) * 1.5;
                    moveInput.y = (deltaY / joyMaxRadius) * 1.5;
                }
                if (touches.right && t.identifier === touches.right.id) {
                    touches.right.isTap = false; 
                    camera.rotation.y -= (t.clientX - touches.right.lastX) * 0.005;
                    camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x - (t.clientY - touches.right.lastY) * 0.005));
                    touches.right.lastX = t.clientX;
                    touches.right.lastY = t.clientY;
                }
            }
        }, {passive: false});

        document.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (touches.left && t.identifier === touches.left.id) { 
                    touches.left = null; moveInput = { x: 0, y: 0 }; 
                    joyBase.style.display = 'none';
                }
                if (touches.right && t.identifier === touches.right.id) {
                    if (touches.right.isTap) shoot();
                    touches.right = null;
                }
            }
        });

        const flashUI = document.getElementById('muzzle-flash');
        function shoot() {
            if (isShooting || !loadedGunModel) return;
            isShooting = true;
            loadedGunModel.position.z = defaultGunZ + 0.05; 
            flashUI.style.opacity = '1';
            setTimeout(() => { flashUI.style.opacity = '0'; }, 50);
            setTimeout(() => { isShooting = false; }, 150);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isShooting && loadedGunModel) {
                loadedGunModel.position.z += (defaultGunZ - loadedGunModel.position.z) * 0.2;
            }
            if (touches.left) {
                camera.translateZ(moveInput.y);
                camera.translateX(moveInput.x);
            }
            if (isFlyingUp) camera.position.y += flySpeed;
            if (isFlyingDown) camera.position.y -= flySpeed;

            coordsDisplay.innerText = `X: ${camera.position.x.toFixed(0)} | 高度: ${camera.position.y.toFixed(0)}`;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
