<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Web CSGO Online - Dust2 War Edition</title>
    
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }

        /* 状态 1: 开始/加载屏幕 */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?ixlib=rb-1.2.1&auto=format&fit=crop&w=2850&q=80');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; transition: opacity 0.5s;
        }
        #start-logo { color: #ffce00; font-size: 54px; font-weight: bold; text-shadow: 4px 4px 0 #000; margin-bottom: 30px; letter-spacing: 5px; text-align: center;}
        #start-button {
            padding: 15px 50px; font-size: 24px; background: #ff9800; color: white; border: 3px solid #fff;
            cursor: pointer; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s; text-transform: uppercase;
        }
        #start-button:active { transform: scale(0.95); }
        #loading-text { color: white; margin-top: 20px; font-size: 18px; font-family: monospace; }

        /* 状态 2: 登录/注册 */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1900;
        }
        .auth-container {
            background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 40px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; width: 300px;
        }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 4px; border: none; background: #eee; font-size: 16px; }
        .auth-btn { width: 100%; padding: 12px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 10px; color: white; transition: opacity 0.2s; }
        #btn-login-auth { background: #4CAF50; }
        #btn-register-auth { background: #2196F3; }
        #btn-guest-auth { background: #ff9800; }

        /* 状态 3: 大厅界面 */
        #lobby-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(90deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.85) 100%);
            display: none; justify-content: space-between; align-items: stretch;
            z-index: 1800; padding: 40px; box-sizing: border-box;
        }
        .user-stats { color: white; width: 250px; background: rgba(0,0,0,0.4); padding: 20px; border-radius: 10px; border-left: 4px solid #ffce00; }
        .user-stats h3 { margin: 0 0 10px 0; color: #ffce00; }
        #btn-find-match { align-self: center; padding: 20px 80px; font-size: 28px; background: #4CAF50; color: white; border: 3px solid #fff; cursor: pointer; border-radius: 8px; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(76, 175, 80, 0); } 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); } }

        /* 状态 4: 选队界面 */
        #team-select-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2500;
        }
        .team-column { width: 300px; padding: 40px; background: rgba(255,255,255,0.05); border: 2px solid #fff; color: white; text-align: center; cursor: pointer; margin: 20px; border-radius: 15px; transition: all 0.3s; }
        .team-column:hover { background: rgba(255,255,255,0.15); transform: translateY(-10px); }
        #btn-t { border-color: #ff5555; box-shadow: inset 0 0 20px rgba(255,85,85,0.3); }
        #btn-ct { border-color: #5555ff; box-shadow: inset 0 0 20px rgba(85,85,255,0.3); }

        /* 游戏内 UI */
        #ui-container { display: none; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #0f0; }
        #crosshair::before { top: 50%; left: 0; width: 100%; height: 2px; transform: translateY(-50%); }
        #crosshair::after { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
        
        #health-display { position: fixed; bottom: 40px; left: 40px; color: #ff5555; font-size: 32px; font-weight: bold; text-shadow: 2px 2px #000; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 5px; border-left: 5px solid #ff5555; }
        #ammo-display { position: fixed; bottom: 40px; right: 40px; color: #ffce00; font-size: 32px; font-weight: bold; text-shadow: 2px 2px #000; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 5px; border-right: 5px solid #ffce00; }
        #coords-display { position: fixed; top: 20px; right: 20px; color: white; font-family: monospace; font-size: 14px; background: rgba(0,0,0,0.5); padding: 5px; }
        #online-count { position: fixed; top: 20px; left: 20px; color: #0f0; font-weight: bold; text-shadow: 1px 1px #000; }

        /* 控制器样式 */
        #joystick-base { position: fixed; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: none; transform: translate(-50%, -50%); pointer-events: none; z-index: 30; }
        #joystick-stick { position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.8); border-radius: 50%; left: 35px; top: 35px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        #shoot-area { position: fixed; right: 40px; bottom: 120px; width: 100px; height: 100px; background: rgba(255,0,0,0.3); border: 3px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; z-index: 30; touch-action: none; }
        #jump-btn { position: fixed; right: 160px; bottom: 120px; width: 80px; height: 80px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; z-index: 30; }
        #view-toggle { position: fixed; top: 80px; left: 20px; padding: 10px; background: rgba(0,0,0,0.6); color: white; border: 1px solid #fff; border-radius: 5px; cursor: pointer; z-index: 30; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="start-screen">
        <div id="start-logo">WEB CSGO<br><span style="font-size:24px; color:#fff;">Diddy Dust2 Edition</span></div>
        <button id="start-button">进入战场</button>
        <div id="loading-text">正在连接指挥部...</div>
    </div>

    <div id="auth-screen">
        <div class="auth-container">
            <h2 style="color:white; margin-top:0;">战士登记</h2>
            <input type="email" id="auth-email" class="auth-input" placeholder="邮箱地址">
            <input type="password" id="auth-password" class="auth-input" placeholder="访问密码">
            <button id="btn-login-auth" class="auth-btn">登录</button>
            <button id="btn-register-auth" class="auth-btn">注册新账号</button>
            <div style="color:gray; margin: 10px 0;">或</div>
            <button id="btn-guest-auth" class="auth-btn">临时访客身份</button>
        </div>
    </div>

    <div id="lobby-screen">
        <div class="user-stats">
            <h3 id="lobby-username">加载中...</h3>
            <p>战绩: <span id="lobby-kd">0 / 0</span></p>
            <p>军衔: <span style="color:#ffce00">新兵</span></p>
            <button id="btn-signout" style="background:none; border:1px solid #fff; color:white; padding:5px 10px; cursor:pointer; margin-top:20px;">退出登录</button>
        </div>
        <button id="btn-find-match">寻找对局</button>
        <div style="width:250px"></div> </div>

    <div id="team-select-screen">
        <h2 style="color:white; font-size:32px; margin-bottom:40px;">选择阵营</h2>
        <div style="display:flex;">
            <div class="team-column" id="btn-t">
                <h1 style="color:#ff5555">T</h1>
                <p>恐怖份子</p>
            </div>
            <div class="team-column" id="btn-ct">
                <h1 style="color:#5555ff">CT</h1>
                <p>反恐精英</p>
            </div>
        </div>
    </div>

    <div id="ui-container">
        <div id="crosshair"></div>
        <div id="health-display">HP: 100</div>
        <div id="ammo-display">7 / 42</div>
        <div id="coords-display">X: 0 | Z: 0</div>
        <div id="online-count">在线人数: 1</div>
        
        <button id="view-toggle">👁️ 切换视角</button>
        <div id="joystick-base"><div id="joystick-stick"></div></div>
        <div id="shoot-area">FIRE</div>
        <div id="jump-btn">JUMP</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { MTLLoader } from 'three/addons/loaders/MTLLoader.js'; 
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { SkeletonUtils } from 'three/addons/utils/SkeletonUtils.js';

        // Firebase 模块
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, update, onValue, onDisconnect, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX5TKLKkC_oHklROdhSB5QtdGZIu_9yIo",
            authDomain: "diddy-gun-game.firebaseapp.com",
            databaseURL: "https://diddy-gun-game-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "diddy-gun-game",
            storageBucket: "diddy-gun-game.firebasestorage.app",
            messagingSenderId: "712812379030",
            appId: "1:712812379030:web:13f04859c2651d177cfbb7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        // --- 全局变量 ---
        let myUid = null;
        let myTeam = null;
        let gameStarted = false;
        let matchActive = false;
        let isThirdPerson = false;
        let ammo = 7, totalAmmo = 42;
        let health = 100;
        let lastMoveTime = Date.now();
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
        scene.add(ambientLight);

        const playerContainer = new THREE.Group();
        scene.add(playerContainer);
        playerContainer.add(camera);
        playerContainer.position.set(0, 1.25, 0);

        const remotePlayers = {};
        const mixers = [];
        const clock = new THREE.Clock();
        const mtlLoader = new MTLLoader();
        const objLoader = new OBJLoader();
        const gltfLoader = new GLTFLoader();

        let mapMesh = null;
        let myBananaModel = null;
        let bananaSceneBase = null;

        // --- 核心修复：地图加载路径 ---
        mtlLoader.setPath(''); // 强制空路径避免 URL 拼接错误
        mtlLoader.load('de_dust2.mtl', (materials) => {
            materials.preload();
            objLoader.setMaterials(materials);
            objLoader.load('de_dust2.obj', (object) => {
                object.scale.set(0.02, 0.02, 0.02);
                object.rotation.x = -Math.PI / 2;
                scene.add(object);
                mapMesh = object;
                document.getElementById('loading-text').innerText = "地图就绪！";
                gameStarted = true;
            });
        });

        // 加载角色模型
        gltfLoader.load('dancing_banana.glb', (gltf) => {
            bananaSceneBase = gltf;
            myBananaModel = SkeletonUtils.clone(gltf.scene);
            myBananaModel.scale.set(2.5, 2.5, 2.5);
            myBananaModel.visible = false; 
            playerContainer.add(myBananaModel);
            myBananaModel.position.y = -1.25;
        });

        // --- 登录系统 ---
        document.getElementById('start-button').onclick = () => {
            if(!gameStarted) return;
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                if(auth.currentUser) showLobby(); else document.getElementById('auth-screen').style.display = 'flex';
            }, 500);
        };

        const showLobby = () => {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('lobby-screen').style.display = 'flex';
        };

        document.getElementById('btn-guest-auth').onclick = () => signInAnonymously(auth);
        document.getElementById('btn-login-auth').onclick = () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        };
        document.getElementById('btn-register-auth').onclick = () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            createUserWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        };
        document.getElementById('btn-signout').onclick = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, (user) => {
            if(user) {
                myUid = user.uid;
                document.getElementById('lobby-username').innerText = user.email || "访客战士_" + user.uid.substring(0,4);
                showLobby();
                
                // 多人同步监听
                const playersRef = ref(database, 'players');
                onValue(playersRef, (snapshot) => {
                    const data = snapshot.val() || {};
                    document.getElementById('online-count').innerText = `在线人数: ${Object.keys(data).length}`;
                    
                    for(let id in data) {
                        if(id === myUid) continue;
                        if(!remotePlayers[id] && bananaSceneBase) {
                            const remoteModel = SkeletonUtils.clone(bananaSceneBase.scene);
                            remoteModel.scale.set(2.5, 2.5, 2.5);
                            scene.add(remoteModel);
                            remotePlayers[id] = remoteModel;
                        }
                        if(remotePlayers[id]) {
                            remotePlayers[id].position.set(data[id].x, data[id].y - 1.25, data[id].z);
                            remotePlayers[id].rotation.y = data[id].rotY || 0;
                        }
                    }
                    for(let id in remotePlayers) { if(!data[id]) { scene.remove(remotePlayers[id]); delete remotePlayers[id]; } }
                });

                // AFK 检查
                setInterval(() => {
                    if(matchActive && Date.now() - lastMoveTime > 60000) {
                        alert("因长时间未移动被移出战场");
                        location.reload();
                    }
                }, 10000);
            }
        });

        // --- 战斗逻辑 ---
        document.getElementById('btn-find-match').onclick = () => {
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('team-select-screen').style.display = 'flex';
        };

        const joinMatch = (team) => {
            myTeam = team;
            matchActive = true;
            document.getElementById('team-select-screen').style.display = 'none';
            document.getElementById('ui-container').style.display = 'block';
            
            playerContainer.position.set(team === 'T' ? 11.5 : 2.5, 1.25, team === 'T' ? 4.5 : 15.5);
            onDisconnect(ref(database, `players/${myUid}`)).remove();
        };

        document.getElementById('btn-t').onclick = () => joinMatch('T');
        document.getElementById('btn-ct').onclick = () => joinMatch('CT');

        // --- 射击系统 ---
        const shoot = () => {
            if(ammo <= 0) return;
            ammo--; updateAmmoUI();
            
            const flash = new THREE.PointLight(0xffaa00, 5, 2);
            flash.position.set(0, 0, -1);
            camera.add(flash);
            setTimeout(() => camera.remove(flash), 50);

            camera.position.y += 0.05; // 后坐力
            setTimeout(() => camera.position.y = 0, 100);
        };
        document.getElementById('shoot-area').addEventListener('touchstart', (e) => { e.preventDefault(); shoot(); });

        const updateAmmoUI = () => { document.getElementById('ammo-display').innerText = `${ammo} / ${totalAmmo}`; };

        // --- 移动与视角 ---
        let moveVec = { x: 0, z: 0 };
        let touches = { move: null, look: null };
        const joyBase = document.getElementById('joystick-base');
        const joyStick = document.getElementById('joystick-stick');

        document.addEventListener('touchstart', (e) => {
            if(!matchActive) return;
            for(let t of e.changedTouches) {
                if(t.clientX < window.innerWidth/2) {
                    touches.move = { id: t.identifier, x: t.clientX, y: t.clientY };
                    joyBase.style.display = 'block';
                    joyBase.style.left = t.clientX + 'px'; joyBase.style.top = t.clientY + 'px';
                } else {
                    touches.look = { id: t.identifier, lx: t.clientX, ly: t.clientY };
                }
            }
        });

        document.addEventListener('touchmove', (e) => {
            if(!matchActive) return;
            for(let t of e.changedTouches) {
                if(touches.move && t.identifier === touches.move.id) {
                    let dx = t.clientX - touches.move.x, dy = t.clientY - touches.move.y;
                    let dist = Math.min(Math.sqrt(dx*dx+dy*dy), 50);
                    let angle = Math.atan2(dy, dx);
                    moveVec.x = Math.cos(angle) * (dist/50) * 0.15;
                    moveVec.z = Math.sin(angle) * (dist/50) * 0.15;
                    joyStick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                    lastMoveTime = Date.now();
                }
                if(touches.look && t.identifier === touches.look.id) {
                    playerContainer.rotation.y -= (t.clientX - touches.look.lx) * 0.005;
                    camera.rotation.x -= (t.clientY - touches.look.ly) * 0.005;
                    camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
                    touches.look.lx = t.clientX; touches.look.ly = t.clientY;
                }
            }
        });

        document.addEventListener('touchend', (e) => {
            for(let t of e.changedTouches) {
                if(touches.move?.id === t.identifier) { touches.move = null; moveVec = {x:0,z:0}; joyBase.style.display='none'; }
                if(touches.look?.id === t.identifier) touches.look = null;
            }
        });

        // 视角切换
        document.getElementById('view-toggle').onclick = () => {
            isThirdPerson = !isThirdPerson;
            if(isThirdPerson) {
                camera.position.set(0, 2, 5);
                if(myBananaModel) myBananaModel.visible = true;
            } else {
                camera.position.set(0, 0, 0);
                if(myBananaModel) myBananaModel.visible = false;
            }
        };

        // --- 跳跃与重力 ---
        let yVelocity = 0;
        let isGrounded = false;
        const downRay = new THREE.Raycaster();

        document.getElementById('jump-btn').onclick = () => {
            if(isGrounded) yVelocity = 0.2;
        };

        // --- 主循环 ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            mixers.forEach(m => m.update(delta));

            if(matchActive && myUid) {
                // 基础移动
                playerContainer.translateX(moveVec.x);
                playerContainer.translateZ(moveVec.z);

                // 重力逻辑
                yVelocity -= 0.01;
                playerContainer.position.y += yVelocity;

                // 地面检测
                if(mapMesh) {
                    const origin = playerContainer.position.clone();
                    origin.y += 0.5;
                    downRay.set(origin, new THREE.Vector3(0, -1, 0));
                    const hits = downRay.intersectObject(mapMesh, true);
                    if(hits.length > 0) {
                        const groundY = hits[0].point.y + 1.25;
                        if(playerContainer.position.y <= groundY) {
                            playerContainer.position.y = groundY;
                            yVelocity = 0;
                            isGrounded = true;
                        } else { isGrounded = false; }
                    }
                }

                // 同步至 Firebase
                update(ref(database, `players/${myUid}`), {
                    x: playerContainer.position.x,
                    y: playerContainer.position.y,
                    z: playerContainer.position.z,
                    rotY: playerContainer.rotation.y,
                    team: myTeam,
                    lastSeen: serverTimestamp()
                });

                document.getElementById('coords-display').innerText = `X: ${playerContainer.position.x.toFixed(1)} | Z: ${playerContainer.position.z.toFixed(1)}`;
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
