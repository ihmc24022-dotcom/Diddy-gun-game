<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Web CSGO Online (Smooth Version)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }

        #crosshair { position: fixed; top: 50%; left: 50%; width: 4px; height: 4px; background: #00ff00; transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; z-index: 10; box-shadow: 0 0 5px #00ff00; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ff00; pointer-events: none; }
        #crosshair::before { top: -8px; left: 1px; width: 2px; height: 20px; }
        #crosshair::after { left: -8px; top: 1px; width: 20px; height: 2px; }

        #ui { position: fixed; top: 10px; left: 10px; color: white; pointer-events: none; z-index: 10; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; font-size: 14px; text-shadow: 1px 1px 0 #000; }

        #team-select { position: fixed; top: 50px; left: 10px; z-index: 15; display: flex; gap: 10px; }
        button { padding: 10px 15px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 5px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        #btn-red { background-color: #d32f2f; }
        #btn-blue { background-color: #1976d2; }
        #btn-red:active { background-color: #b71c1c; }
        #btn-blue:active { background-color: #0d47a1; }

        #btn-view { position: fixed; top: 100px; left: 10px; z-index: 15; background-color: #ff9800; }
        #btn-view:active { background-color: #e65100; }

        #coords-display { position: fixed; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.7); border: 1px solid #00ff00; color: #00ff00; padding: 8px 15px; border-radius: 5px; font-family: monospace; font-size: 16px; font-weight: bold; pointer-events: none; z-index: 20; text-shadow: 0 0 5px #00ff00; }

        #joystick-base { position: fixed; width: 100px; height: 100px; background: rgba(0, 0, 0, 0.4); border: 2px solid rgba(0, 0, 0, 0.7); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; display: none; z-index: 30; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: rgba(0, 0, 0, 0.9); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px rgba(0,0,0,0.8); pointer-events: none; }

        #btn-jump { position: fixed; bottom: 40px; right: 40px; width: 70px; height: 70px; background: rgba(0, 0, 0, 0.4); border: 2px solid rgba(0, 0, 0, 0.7); border-radius: 50%; color: white; font-size: 16px; font-weight: bold; z-index: 30; cursor: pointer; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
        #btn-reload { position: fixed; bottom: 50px; right: 130px; width: 50px; height: 50px; background: rgba(0, 0, 0, 0.4); border: 2px solid rgba(0, 0, 0, 0.7); border-radius: 50%; color: white; font-size: 18px; font-weight: bold; z-index: 30; cursor: pointer; user-select: none; -webkit-user-select: none; touch-action: manipulation; }

        #ammo-display { position: fixed; bottom: 120px; right: 40px; background: rgba(0, 0, 0, 0.7); border: 1px solid #ffce00; color: #ffce00; padding: 8px 15px; border-radius: 5px; font-family: monospace; font-size: 20px; font-weight: bold; pointer-events: none; z-index: 20; text-shadow: 0 0 5px #ffce00; }

        #online-count { position: fixed; top: 140px; left: 10px; background: rgba(0, 0, 0, 0.7); border: 1px solid #00ffff; color: #00ffff; padding: 5px 10px; border-radius: 5px; font-weight: bold; z-index: 20; }

        #hit-marker { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: red; font-size: 24px; font-weight: bold; pointer-events: none; opacity: 0; transition: opacity 0.1s; z-index: 15; }
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ffce00; font-size: 24px; font-weight: bold; z-index: 20; pointer-events: none; text-shadow: 2px 2px 4px #000; text-align: center;}
        #muzzle-flash { position: fixed; top: 50%; left: 50%; width: 100vw; height: 100vh; background: rgba(255, 200, 0, 0.2); transform: translate(-50%, -50%); pointer-events: none; opacity: 0; transition: opacity 0.05s; z-index: 5; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui">多人在线版 (平滑插值版)</div>
    <div id="online-count">在线人数: 连接中...</div>
    
    <div id="coords-display">X: 0.00 | Z: 0.00</div>
    <div id="ammo-display">7 / 42</div>
    
    <button id="btn-reload">R</button>
    <div id="team-select">
        <button id="btn-red">加入红队 (T)</button>
        <button id="btn-blue">加入蓝队 (CT)</button>
    </div>
    
    <button id="btn-view">👁️ 切换视角 (FPS/TPS)</button>
    <button id="btn-jump">JUMP</button>

    <div id="joystick-base"><div id="joystick-stick"></div></div>
    <div id="loading">连接服务器...<br>Map Loading 0%</div>
    <div id="crosshair"></div>
    <div id="hit-marker">✖</div>
    <div id="muzzle-flash"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Firebase 模块
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX5TKLKkC_oHklROdhSB5QtdGZIu_9yIo",
            authDomain: "diddy-gun-game.firebaseapp.com",
            databaseURL: "https://diddy-gun-game-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "diddy-gun-game",
            storageBucket: "diddy-gun-game.firebasestorage.app",
            messagingSenderId: "712812379030",
            appId: "1:712812379030:web:13f04859c2651d177cfbb7",
            measurementId: "G-WVXBDG2H45"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const database = getDatabase(app);

        let myUid = null;
        let remotePlayers = {}; // 用于存储其他玩家的数据 (包含模型和目标坐标)

        // Three.js 初始化
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); 
        scene.fog = new THREE.Fog(0x87ceeb, 10, 300); 
        const clock = new THREE.Clock(); 
        let mixers = []; 

        const playerContainer = new THREE.Group();
        const startX = 2 + (Math.random() * 4 - 2);
        playerContainer.position.set(startX, 1.25, 15); 
        scene.add(playerContainer);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        playerContainer.add(camera); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7); 
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); 
        dirLight.position.set(100, 200, 50);
        scene.add(dirLight);

        let mapMesh = null;
        const raycaster = new THREE.Raycaster();
        const downRaycaster = new THREE.Raycaster(); 
        const shootRaycaster = new THREE.Raycaster();

        const objLoader = new OBJLoader();
        const gltfLoader = new GLTFLoader();
        const loadingUI = document.getElementById('loading');

        // 加载地图
        objLoader.load('de_dust2.obj', function (object) {
            const sandMaterial = new THREE.MeshStandardMaterial({ color: 0xFFC976, roughness: 0.9, side: THREE.DoubleSide });
            object.traverse(function (child) { if (child.isMesh) child.material = sandMaterial; });
            object.scale.set(0.02, 0.02, 0.02); 
            object.position.set(0, 0, 0);
            object.rotation.x = -Math.PI / 2; 
            scene.add(object);
            mapMesh = object; 
        }, function (xhr) {
            if (xhr.lengthComputable) {
                let p = Math.round(xhr.loaded / xhr.total * 100);
                if (p === 100) loadingUI.style.display = 'none';
                else loadingUI.innerText = '加载地图 ' + p + '%';
            }
        });

        let myBody = null;
        let isTPS = false; 

        // 加载自己
        gltfLoader.load('dancing_banana.glb', function (gltf) {
            myBody = gltf.scene;
            myBody.scale.set(2.5, 2.5, 2.5); 
            myBody.position.set(0, -1.25, 0); 
            myBody.rotation.y = Math.PI; 
            
            if (gltf.animations && gltf.animations.length > 0) {
                let mixer = new THREE.AnimationMixer(myBody);
                mixer.clipAction(gltf.animations[0]).play();
                mixers.push(mixer);
            }
            myBody.visible = isTPS; 
            playerContainer.add(myBody); 
        });

        // 加载枪
        const gunGroup = new THREE.Group();
        camera.add(gunGroup); 
        let loadedGunModel = null;
        let defaultGunZ = -0.55; 
        let defaultGunY = -0.35; 

        gltfLoader.load('pistol__usp_no_silencer_weapon_model_cs2.glb', function (gltf) {
            loadedGunModel = gltf.scene;
            loadedGunModel.scale.set(1.5, 1.5, 1.5); 
            loadedGunModel.position.set(0.35, defaultGunY, defaultGunZ); 
            loadedGunModel.rotation.y = Math.PI + 0.08; 
            gunGroup.add(loadedGunModel);
        });

        // ==========================================
        // 核心修改：网络同步与插值 (Lerp)
        // ==========================================
        signInAnonymously(auth).catch(error => console.error("Firebase Login Error:", error));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                myUid = user.uid;
                const myRef = ref(database, `players/${myUid}`);
                onDisconnect(myRef).remove();

                const playersRef = ref(database, 'players');
                onValue(playersRef, (snapshot) => {
                    const data = snapshot.val() || {};
                    let onlineCount = 0;

                    for (let uid in data) {
                        onlineCount++;
                        if (uid === myUid) continue; 

                        // 1. 如果是新玩家，创建模型并记录【目标坐标】
                        if (!remotePlayers[uid] && remotePlayers[uid] !== "loading") {
                            remotePlayers[uid] = "loading"; 
                            gltfLoader.load('dancing_banana.glb', function(gltf) {
                                let networkBanana = gltf.scene;
                                networkBanana.scale.set(2.5, 2.5, 2.5);
                                networkBanana.position.set(data[uid].x, data[uid].y - 1.25, data[uid].z);
                                networkBanana.rotation.y = data[uid].rotY + Math.PI || 0;

                                if (gltf.animations && gltf.animations.length > 0) {
                                    let mixer = new THREE.AnimationMixer(networkBanana);
                                    mixer.clipAction(gltf.animations[0]).play();
                                    mixers.push(mixer);
                                }
                                scene.add(networkBanana);
                                
                                // 改动：把模型和它的"目标坐标"存起来，而不是只存模型
                                remotePlayers[uid] = {
                                    model: networkBanana,
                                    targetPos: new THREE.Vector3(data[uid].x, data[uid].y - 1.25, data[uid].z),
                                    targetRotY: data[uid].rotY + Math.PI
                                };
                            });
                        } 
                        // 2. 如果玩家已经在场，更新他的【目标坐标】，不要直接移动他
                        else if (remotePlayers[uid] && remotePlayers[uid] !== "loading") {
                            let rp = remotePlayers[uid];
                            rp.targetPos.set(data[uid].x, data[uid].y - 1.25, data[uid].z); 
                            rp.targetRotY = data[uid].rotY + Math.PI; 
                        }
                    }

                    // 3. 清理断线玩家
                    for (let uid in remotePlayers) {
                        if (!data[uid] && uid !== myUid) {
                            if (remotePlayers[uid] !== "loading") {
                                scene.remove(remotePlayers[uid].model); // 删掉模型
                            }
                            delete remotePlayers[uid];
                        }
                    }

                    document.getElementById('online-count').innerText = `在线人数: ${onlineCount}`;
                });
            }
        });

        // 控制代码
        document.getElementById('btn-view').addEventListener('click', (e) => {
            e.stopPropagation(); 
            isTPS = !isTPS;
            if(isTPS) {
                camera.position.set(0, 1.5, 4.5); 
                camera.rotation.x = -0.15; 
                if(loadedGunModel) loadedGunModel.visible = false; 
                if(myBody) myBody.visible = true; 
            } else {
                camera.position.set(0, 0, 0); 
                camera.rotation.x = 0;
                if(loadedGunModel) loadedGunModel.visible = true; 
                if(myBody) myBody.visible = false; 
            }
        });

        let ammoInMag = 7;
        const maxAmmoInMag = 7;
        let ammoReserve = 42;
        let isReloading = false;
        const ammoDisplay = document.getElementById('ammo-display');

        function updateAmmoUI() {
            if (isReloading) {
                ammoDisplay.innerText = "换弹中...";
                ammoDisplay.style.color = "#ff5555";
            } else {
                ammoDisplay.innerText = `${ammoInMag} / ${ammoReserve}`;
                ammoDisplay.style.color = ammoInMag === 0 ? "#ff5555" : "#ffce00"; 
            }
        }

        function reloadWeapon(e) {
            if (e) e.preventDefault();
            if (isReloading || ammoInMag === maxAmmoInMag || ammoReserve === 0) return;
            isReloading = true; updateAmmoUI();
            if (loadedGunModel) loadedGunModel.position.y = defaultGunY - 0.6;
            setTimeout(() => {
                let neededAmmo = maxAmmoInMag - ammoInMag;
                let reloadAmount = Math.min(neededAmmo, ammoReserve);
                ammoInMag += reloadAmount; ammoReserve -= reloadAmount;
                isReloading = false;
                if (loadedGunModel) loadedGunModel.position.y = defaultGunY;
                updateAmmoUI();
            }, 1500);
        }

        document.getElementById('btn-reload').addEventListener('touchstart', reloadWeapon);
        document.getElementById('btn-reload').addEventListener('mousedown', reloadWeapon);
        document.getElementById('btn-red').addEventListener('click', () => { playerContainer.position.set(11, 1.25, 4); yVelocity = 0; });
        document.getElementById('btn-blue').addEventListener('click', () => { playerContainer.position.set(2, 1.25, 15); yVelocity = 0; });

        const joyBase = document.getElementById('joystick-base');
        const joyStick = document.getElementById('joystick-stick');
        const coordsDisplay = document.getElementById('coords-display'); 
        const joyMaxRadius = 50; 

        let yVelocity = 0; 
        let isGrounded = false;
        const gravity = -0.012; 
        const jumpStrength = 0.15; 
        let moveInput = { x: 0, y: 0 };
        let touches = { left: null, right: null };
        let isShooting = false;

        document.getElementById('btn-jump').addEventListener('touchstart', (e) => { e.preventDefault(); if (isGrounded) { yVelocity = jumpStrength; isGrounded = false; }});
        document.getElementById('btn-jump').addEventListener('mousedown', (e) => { e.preventDefault(); if (isGrounded) { yVelocity = jumpStrength; isGrounded = false; }});

        document.addEventListener('touchstart', (e) => {
            if(e.target.tagName === 'BUTTON') return; 
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2) {
                    touches.left = { id: t.identifier, startX: t.clientX, startY: t.clientY };
                    joyBase.style.display = 'block'; joyBase.style.left = t.clientX + 'px'; joyBase.style.top = t.clientY + 'px';
                    joyStick.style.transform = `translate(-50%, -50%)`;
                } else {
                    touches.right = { id: t.identifier, lastX: t.clientX, lastY: t.clientY, isTap: true };
                }
            }
        });

        document.addEventListener('touchmove', (e) => {
            for (let t of e.changedTouches) {
                if (touches.left && t.identifier === touches.left.id) {
                    let deltaX = t.clientX - touches.left.startX;
                    let deltaY = t.clientY - touches.left.startY;
                    const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                    if (distance > joyMaxRadius) { deltaX = (deltaX / distance) * joyMaxRadius; deltaY = (deltaY / distance) * joyMaxRadius; }
                    joyStick.style.transform = `translate(calc(-50% + ${deltaX}px), calc(-50% + ${deltaY}px))`;
                    moveInput.x = (deltaX / joyMaxRadius) * 0.15; moveInput.y = (deltaY / joyMaxRadius) * 0.15;
                }
                if (touches.right && t.identifier === touches.right.id) {
                    touches.right.isTap = false; 
                    playerContainer.rotation.y -= (t.clientX - touches.right.lastX) * 0.005;
                    camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x - (t.clientY - touches.right.lastY) * 0.005));
                    touches.right.lastX = t.clientX; touches.right.lastY = t.clientY;
                }
            }
        });

        document.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (touches.left && t.identifier === touches.left.id) { touches.left = null; moveInput = { x: 0, y: 0 }; joyBase.style.display = 'none'; }
                if (touches.right && t.identifier === touches.right.id) { if (touches.right.isTap) shoot(); touches.right = null; }
            }
        });

        // 支持电脑端鼠标左键开枪 (刚才加上去的)
        document.addEventListener('mousedown', (e) => {
            if(e.target.tagName === 'BUTTON' || e.target.closest('#team-select')) return; 
            if (e.button === 0) { shoot(); }
        });

        const flashUI = document.getElementById('muzzle-flash');
        const hitMarker = document.getElementById('hit-marker');

        function shoot() {
            if (isShooting || (!isTPS && !loadedGunModel) || isReloading) return; 
            if (ammoInMag <= 0) { reloadWeapon(); return; }

            isShooting = true; ammoInMag--; updateAmmoUI();
            if (!isTPS && loadedGunModel) loadedGunModel.position.z = defaultGunZ + 0.1; 
            flashUI.style.opacity = '1';
            
            const shootOrigin = new THREE.Vector3();
            camera.getWorldPosition(shootOrigin);
            const shootDir = new THREE.Vector3();
            camera.getWorldDirection(shootDir);
            shootRaycaster.set(shootOrigin, shootDir);

            // 改动：适配新的 remotePlayers 数据结构
            let networkTargets = [];
            for (let uid in remotePlayers) {
                if (remotePlayers[uid] !== "loading" && remotePlayers[uid].model) {
                    networkTargets.push(remotePlayers[uid].model);
                }
            }

            const intersects = shootRaycaster.intersectObjects(networkTargets, true);
            if (intersects.length > 0) {
                hitMarker.style.opacity = '1';
                setTimeout(() => { hitMarker.style.opacity = '0'; }, 200);
            }

            setTimeout(() => { flashUI.style.opacity = '0'; }, 50);
            setTimeout(() => { isShooting = false; }, 150);
        }

        function checkCollision(startPos, endPos) {
            if (!mapMesh) return false; 
            const currentY = playerContainer.position.y;
            const checkStart = startPos.clone(); checkStart.y = currentY; 
            const checkEnd = endPos.clone(); checkEnd.y = currentY;
            const direction = new THREE.Vector3().subVectors(checkEnd, checkStart);
            const distance = direction.length();
            if (distance === 0) return false;
            direction.normalize(); 
            raycaster.set(checkStart, direction);
            const intersects = raycaster.intersectObject(mapMesh, true);
            if (intersects.length > 0 && intersects[0].distance < distance + 0.2) return true; 
            return false; 
        }

        let lastSyncTime = 0;

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            mixers.forEach(mixer => mixer.update(delta));

            // 上传自己坐标
            if (myUid && Date.now() - lastSyncTime > 66) {
                const myRef = ref(database, `players/${myUid}`);
                set(myRef, {
                    x: playerContainer.position.x,
                    y: playerContainer.position.y,
                    z: playerContainer.position.z,
                    rotY: playerContainer.rotation.y
                });
                lastSyncTime = Date.now();
            }

            // ========================================================
            // 让其他玩家【平滑移动 (Lerp)】的核心代码
            // ========================================================
            for (let uid in remotePlayers) {
                let rp = remotePlayers[uid];
                if (rp !== "loading" && rp.model) {
                    // 位置插值：以 0.2 的速度滑向目标坐标
                    rp.model.position.lerp(rp.targetPos, 0.2); 
                    
                    // 旋转插值：计算最短的旋转角度，平滑转身
                    let diff = rp.targetRotY - rp.model.rotation.y;
                    diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                    rp.model.rotation.y += diff * 0.2; 
                }
            }

            if (playerContainer.position.y < -10) { playerContainer.position.set(2, 1.25, 15); yVelocity = 0; }
            if (!isShooting && loadedGunModel && !isReloading) loadedGunModel.position.z += (defaultGunZ - loadedGunModel.position.z) * 0.2;

            if (touches.left) {
                let oldPosition = playerContainer.position.clone();
                playerContainer.translateZ(moveInput.y);
                if (checkCollision(oldPosition, playerContainer.position)) playerContainer.position.copy(oldPosition); 
                oldPosition = playerContainer.position.clone();
                playerContainer.translateX(moveInput.x);
                if (checkCollision(oldPosition, playerContainer.position)) playerContainer.position.copy(oldPosition); 
            }

            if (mapMesh) {
                yVelocity += gravity;
                playerContainer.position.y += yVelocity;

                const rayOrigin = playerContainer.position.clone();
                rayOrigin.y += 0.5; 
                downRaycaster.set(rayOrigin, new THREE.Vector3(0, -1, 0));
                const intersects = downRaycaster.intersectObject(mapMesh, true);
                
                if (intersects.length > 0) {
                    const groundHeight = intersects[0].point.y;
                    const targetY = groundHeight + 1.25; 
                    if (targetY <= playerContainer.position.y + 1.0) {
                        if (playerContainer.position.y <= targetY) {
                            playerContainer.position.y += (targetY - playerContainer.position.y) * 0.4; 
                            isGrounded = true;
                            if (yVelocity < 0) yVelocity = 0; 
                        } else { isGrounded = false; }
                    } else { isGrounded = false; }
                } else { isGrounded = false; }
            }

            coordsDisplay.innerText = `X: ${playerContainer.position.x.toFixed(1)} | Z: ${playerContainer.position.z.toFixed(1)}`;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateAmmoUI();
        animate();
    </script>
</body>
</html>
