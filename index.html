<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Web CSGO - 跳舞香蕉靶场版 (Dust 2 + USP + Dancing Banana)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 4px; height: 4px; background: #00ff00; transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; z-index: 10; box-shadow: 0 0 5px #00ff00; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ff00; pointer-events: none; }
        #crosshair::before { top: -8px; left: 1px; width: 2px; height: 20px; }
        #crosshair::after { left: -8px; top: 1px; width: 20px; height: 2px; }
        
        #ui { position: fixed; top: 10px; left: 10px; color: white; pointer-events: none; z-index: 10; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; font-size: 14px; text-shadow: 1px 1px 0 #000; }
        
        #team-select { position: fixed; top: 50px; left: 10px; z-index: 15; display: flex; gap: 10px; }
        button { padding: 10px 15px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 5px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        #btn-red { background-color: #d32f2f; }
        #btn-blue { background-color: #1976d2; }
        #btn-red:active { background-color: #b71c1c; }
        #btn-blue:active { background-color: #0d47a1; }

        #coords-display {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 8px 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            pointer-events: none;
            z-index: 20;
            text-shadow: 0 0 5px #00ff00;
        }

        #joystick-base { position: fixed; width: 100px; height: 100px; background: rgba(0, 0, 0, 0.4); border: 2px solid rgba(0, 0, 0, 0.7); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; display: none; z-index: 30; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: rgba(0, 0, 0, 0.9); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px rgba(0,0,0,0.8); pointer-events: none; }

        #btn-jump {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 70px;
            height: 70px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            color: white;
            font-size: 16px;
            font-weight: bold;
            z-index: 30;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation; 
        }
        #btn-jump:active { background: rgba(255, 255, 255, 0.3); }

        #btn-reload {
            position: fixed;
            bottom: 50px;
            right: 130px; 
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            color: white;
            font-size: 18px;
            font-weight: bold;
            z-index: 30;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation; 
        }
        #btn-reload:active { background: rgba(255, 255, 255, 0.3); }

        #ammo-display {
            position: fixed;
            bottom: 120px; 
            right: 40px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #ffce00;
            color: #ffce00;
            padding: 8px 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 20px;
            font-weight: bold;
            pointer-events: none;
            z-index: 20;
            text-shadow: 0 0 5px #ffce00;
        }

        #hit-marker {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: red;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
            z-index: 15;
        }

        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ffce00; font-size: 24px; font-weight: bold; z-index: 20; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        #muzzle-flash { position: fixed; top: 50%; left: 50%; width: 100vw; height: 100vh; background: rgba(255, 200, 0, 0.2); transform: translate(-50%, -50%); pointer-events: none; opacity: 0; transition: opacity 0.05s; z-index: 5; }
    </style>
</head>
<body>
    <div id="ui">靶场模式：击杀跳舞香蕉 (固定朝向版)</div>
    
    <div id="coords-display">X: 0.00 | Z: 0.00</div>

    <div id="ammo-display">7 / 42</div>
    <button id="btn-reload">R</button>

    <div id="team-select">
        <button id="btn-red">加入红队 (T)</button>
        <button id="btn-blue">加入蓝队 (CT)</button>
    </div>

    <button id="btn-jump">JUMP</button>

    <div id="joystick-base">
        <div id="joystick-stick"></div>
    </div>

    <div id="loading">Map Loading 0%</div>
    <div id="crosshair"></div>
    <div id="hit-marker">✖</div>
    <div id="muzzle-flash"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); 
        scene.fog = new THREE.Fog(0x87ceeb, 10, 300); 

        const clock = new THREE.Clock(); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(2, 1.25, 15); 
        camera.rotation.order = 'YXZ'; 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7); 
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); 
        dirLight.position.set(100, 200, 50);
        scene.add(dirLight);

        let mapMesh = null;
        const raycaster = new THREE.Raycaster();
        const downRaycaster = new THREE.Raycaster(); 
        const shootRaycaster = new THREE.Raycaster();

        const objLoader = new THREE.OBJLoader();
        const gltfLoader = new THREE.GLTFLoader();
        const loadingUI = document.getElementById('loading');
        
        // 1. 加载地图
        objLoader.load(
            'de_dust2.obj',
            function (object) {
                loadingUI.style.display = 'none';
                const sandMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xFFC976, 
                    roughness: 0.9, side: THREE.DoubleSide 
                });
                object.traverse(function (child) {
                    if (child.isMesh) child.material = sandMaterial;
                });
                object.scale.set(0.02, 0.02, 0.02); 
                object.position.set(0, 0, 0);
                object.rotation.x = -Math.PI / 2; 
                scene.add(object);
                mapMesh = object; 
            },
            function (xhr) {
                if (xhr.lengthComputable) {
                    loadingUI.innerText = '加载地图 ' + Math.round(xhr.loaded / xhr.total * 100) + '%';
                }
            }
        );

        // 2. 加载武器
        const gunGroup = new THREE.Group();
        camera.add(gunGroup);
        scene.add(camera);

        let loadedGunModel = null;
        let defaultGunZ = -0.55; 
        let defaultGunY = -0.35; 

        gltfLoader.load('pistol__usp_no_silencer_weapon_model_cs2.glb', function (gltf) {
            loadedGunModel = gltf.scene;
            loadedGunModel.scale.set(1.5, 1.5, 1.5); 
            loadedGunModel.position.set(0.35, defaultGunY, defaultGunZ); 
            loadedGunModel.rotation.y = Math.PI + 0.08; 
            gunGroup.add(loadedGunModel);
        });

        // 3. 加载跳舞香蕉并激活骨骼动画 (移除跟随玩家视角的设定)
        let targetPlayers = []; 
        let mixers = []; 

        // 包含初始旋转角度 (rot)，让它们朝向不同的方向
        const spawnPoints = [
            { x: 11, y: 1.0, z: -2, rot: Math.PI / 4 }, 
            { x: 2, y: 1.0, z: 8, rot: -Math.PI / 2 },   
            { x: 6, y: 1.0, z: 5, rot: Math.PI }    
        ];

        spawnPoints.forEach(pos => {
            gltfLoader.load('dancing_banana.glb', function (gltf) {
                let bananaModel = gltf.scene;
                
                bananaModel.scale.set(2.5, 2.5, 2.5); 
                bananaModel.position.set(pos.x, pos.y, pos.z);
                
                // ✅ 给香蕉设置固定的朝向
                bananaModel.rotation.y = pos.rot;
                
                if (gltf.animations && gltf.animations.length > 0) {
                    let mixer = new THREE.AnimationMixer(bananaModel);
                    let action = mixer.clipAction(gltf.animations[0]); 
                    action.play();
                    mixers.push(mixer);
                }

                scene.add(bananaModel);
                targetPlayers.push(bananaModel);
            });
        });

        // 弹药系统
        let ammoInMag = 7;
        const maxAmmoInMag = 7;
        let ammoReserve = 42;
        let isReloading = false;
        const ammoDisplay = document.getElementById('ammo-display');
        const hitMarker = document.getElementById('hit-marker');

        function updateAmmoUI() {
            if (isReloading) {
                ammoDisplay.innerText = "换弹中...";
                ammoDisplay.style.color = "#ff5555";
            } else {
                ammoDisplay.innerText = `${ammoInMag} / ${ammoReserve}`;
                ammoDisplay.style.color = ammoInMag === 0 ? "#ff5555" : "#ffce00"; 
            }
        }

        function reloadWeapon(e) {
            if (e) e.preventDefault();
            if (isReloading || ammoInMag === maxAmmoInMag || ammoReserve === 0) return;
            isReloading = true;
            updateAmmoUI();
            if (loadedGunModel) loadedGunModel.position.y = defaultGunY - 0.6;

            setTimeout(() => {
                let neededAmmo = maxAmmoInMag - ammoInMag;
                let reloadAmount = Math.min(neededAmmo, ammoReserve);
                ammoInMag += reloadAmount;
                ammoReserve -= reloadAmount;
                isReloading = false;
                if (loadedGunModel) loadedGunModel.position.y = defaultGunY;
                updateAmmoUI();
            }, 1500);
        }

        document.getElementById('btn-reload').addEventListener('touchstart', reloadWeapon);
        document.getElementById('btn-reload').addEventListener('mousedown', reloadWeapon);

        // 阵营传送
        document.getElementById('btn-red').addEventListener('click', () => { camera.position.set(11, 1.25, 4); yVelocity = 0; });
        document.getElementById('btn-blue').addEventListener('click', () => { camera.position.set(2, 1.25, 15); yVelocity = 0; });

        // 控制变量
        const joyBase = document.getElementById('joystick-base');
        const joyStick = document.getElementById('joystick-stick');
        const coordsDisplay = document.getElementById('coords-display'); 
        const joyMaxRadius = 50; 

        let yVelocity = 0; 
        let isGrounded = false;
        const gravity = -0.012; 
        const jumpStrength = 0.15; 
        let moveInput = { x: 0, y: 0 };
        let touches = { left: null, right: null };
        let isShooting = false;

        function handleJump(e) {
            e.preventDefault(); 
            if (isGrounded) { yVelocity = jumpStrength; isGrounded = false; }
        }
        document.getElementById('btn-jump').addEventListener('touchstart', handleJump);
        document.getElementById('btn-jump').addEventListener('mousedown', handleJump); 

        // 触控摇杆与视角控制
        document.addEventListener('touchstart', (e) => {
            if(e.target.tagName === 'BUTTON') return; 
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2) {
                    touches.left = { id: t.identifier, startX: t.clientX, startY: t.clientY };
                    joyBase.style.display = 'block';
                    joyBase.style.left = t.clientX + 'px';
                    joyBase.style.top = t.clientY + 'px';
                    joyStick.style.transform = `translate(-50%, -50%)`;
                } else {
                    touches.right = { id: t.identifier, lastX: t.clientX, lastY: t.clientY, isTap: true };
                }
            }
        });

        document.addEventListener('touchmove', (e) => {
            for (let t of e.changedTouches) {
                if (touches.left && t.identifier === touches.left.id) {
                    let deltaX = t.clientX - touches.left.startX;
                    let deltaY = t.clientY - touches.left.startY;
                    const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
                    if (distance > joyMaxRadius) {
                        deltaX = (deltaX / distance) * joyMaxRadius;
                        deltaY = (deltaY / distance) * joyMaxRadius;
                    }
                    joyStick.style.transform = `translate(calc(-50% + ${deltaX}px), calc(-50% + ${deltaY}px))`;
                    moveInput.x = (deltaX / joyMaxRadius) * 0.15;
                    moveInput.y = (deltaY / joyMaxRadius) * 0.15;
                }
                if (touches.right && t.identifier === touches.right.id) {
                    touches.right.isTap = false; 
                    camera.rotation.y -= (t.clientX - touches.right.lastX) * 0.005;
                    camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x - (t.clientY - touches.right.lastY) * 0.005));
                    touches.right.lastX = t.clientX;
                    touches.right.lastY = t.clientY;
                }
            }
        });

        document.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (touches.left && t.identifier === touches.left.id) { 
                    touches.left = null; moveInput = { x: 0, y: 0 }; joyBase.style.display = 'none';
                }
                if (touches.right && t.identifier === touches.right.id) {
                    if (touches.right.isTap) shoot();
                    touches.right = null;
                }
            }
        });

        // 开火与射线击杀判定
        const flashUI = document.getElementById('muzzle-flash');
        function shoot() {
            if (isShooting || !loadedGunModel || isReloading) return; 
            
            if (ammoInMag <= 0) {
                reloadWeapon();
                return;
            }

            isShooting = true;
            ammoInMag--;
            updateAmmoUI();

            loadedGunModel.position.z = defaultGunZ + 0.1; 
            flashUI.style.opacity = '1';
            
            shootRaycaster.set(camera.position, camera.getWorldDirection(new THREE.Vector3()));
            const intersects = shootRaycaster.intersectObjects(targetPlayers, true);
            
            if (intersects.length > 0) {
                let hitMesh = intersects[0].object;
                let rootPlayer = null;
                
                targetPlayers.forEach(playerGroup => {
                    playerGroup.traverse(child => {
                        if(child === hitMesh) rootPlayer = playerGroup;
                    });
                });

                if (rootPlayer && rootPlayer.visible) {
                    hitMarker.style.opacity = '1';
                    setTimeout(() => { hitMarker.style.opacity = '0'; }, 200);

                    rootPlayer.visible = false;
                    
                    setTimeout(() => {
                        rootPlayer.visible = true;
                    }, 3000);
                }
            }

            setTimeout(() => { flashUI.style.opacity = '0'; }, 50);
            setTimeout(() => { isShooting = false; }, 150);
        }

        function checkCollision(startPos, endPos) {
            if (!mapMesh) return false; 
            const currentY = camera.position.y;
            const checkStart = startPos.clone(); checkStart.y = currentY; 
            const checkEnd = endPos.clone(); checkEnd.y = currentY;
            const direction = new THREE.Vector3().subVectors(checkEnd, checkStart);
            const distance = direction.length();
            if (distance === 0) return false;
            direction.normalize(); 
            raycaster.set(checkStart, direction);
            const intersects = raycaster.intersectObject(mapMesh, true);
            if (intersects.length > 0 && intersects[0].distance < distance + 0.2) return true; 
            return false; 
        }

        // 渲染循环
        function animate() {
            requestAnimationFrame(animate);

            // 更新动画 Mixer，让香蕉跳舞
            const delta = clock.getDelta();
            mixers.forEach(mixer => mixer.update(delta));

            if (camera.position.y < -10) {
                camera.position.set(2, 1.25, 15);
                yVelocity = 0;
            }

            if (!isShooting && loadedGunModel && !isReloading) {
                loadedGunModel.position.z += (defaultGunZ - loadedGunModel.position.z) * 0.2;
            }

            if (touches.left) {
                let oldPosition = camera.position.clone();
                camera.translateZ(moveInput.y);
                if (checkCollision(oldPosition, camera.position)) camera.position.copy(oldPosition); 
                oldPosition = camera.position.clone();
                camera.translateX(moveInput.x);
                if (checkCollision(oldPosition, camera.position)) camera.position.copy(oldPosition); 
            }

            if (mapMesh) {
                yVelocity += gravity;
                camera.position.y += yVelocity;

                const rayOrigin = camera.position.clone();
                rayOrigin.y += 0.5; 
                downRaycaster.set(rayOrigin, new THREE.Vector3(0, -1, 0));
                const intersects = downRaycaster.intersectObject(mapMesh, true);
                
                if (intersects.length > 0) {
                    const groundHeight = intersects[0].point.y;
                    const targetY = groundHeight + 1.25; 
                    
                    if (targetY <= camera.position.y + 1.0) {
                        if (camera.position.y <= targetY) {
                            camera.position.y += (targetY - camera.position.y) * 0.4; 
                            isGrounded = true;
                            if (yVelocity < 0) yVelocity = 0; 
                        } else {
                            isGrounded = false;
                        }
                    } else {
                        isGrounded = false;
                    }
                } else {
                    isGrounded = false;
                }
            }

            // ✅ 已移除 player.lookAt(camera.position) 逻辑，香蕉人现在会保持固定的朝向

            coordsDisplay.innerText = `X: ${camera.position.x.toFixed(1)} | Z: ${camera.position.z.toFixed(1)}`;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateAmmoUI();
        animate();
    </script>
</body>
</html>
