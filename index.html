<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Web CSGO - 真实物理生存版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        
        #crosshair { position: fixed; top: 50%; left: 50%; width: 4px; height: 4px; background: #00ff00; transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; z-index: 10; box-shadow: 0 0 5px #00ff00; }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00ff00; pointer-events: none; }
        #crosshair::before { top: -8px; left: 1px; width: 2px; height: 20px; }
        #crosshair::after { left: -8px; top: 1px; width: 20px; height: 2px; }
        
        #ui { position: fixed; top: 10px; left: 10px; color: #00ff00; pointer-events: none; z-index: 10; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; font-size: 14px; text-shadow: 1px 1px 0 #000; font-weight: bold; }
        #coords-display { position: fixed; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.7); border: 1px solid #00ff00; color: #00ff00; padding: 8px 15px; border-radius: 5px; font-family: monospace; font-size: 16px; font-weight: bold; pointer-events: none; z-index: 20; }
        
        #team-select { position: fixed; top: 50px; left: 10px; z-index: 15; display: flex; gap: 10px; }
        button { padding: 10px 15px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 5px; cursor: pointer; pointer-events: auto; }
        #btn-red { background-color: #d32f2f; }
        #btn-blue { background-color: #1976d2; }

        #joystick-base { position: fixed; width: 100px; height: 100px; background: rgba(0, 0, 0, 0.4); border: 2px solid rgba(0, 0, 0, 0.7); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; display: none; z-index: 30; }
        #joystick-stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: rgba(0, 0, 0, 0.9); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }

        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ffce00; font-size: 24px; font-weight: bold; z-index: 100; text-align: center; }
        #muzzle-flash { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(255, 200, 0, 0.2); pointer-events: none; opacity: 0; z-index: 5; transition: opacity 0.05s; }
    </style>
</head>
<body>
    <div id="ui">🔫 模式：防穿墙物理版 (#FFB954)</div>
    <div id="coords-display">X: 0 | Z: 0</div>
    <div id="team-select">
        <button id="btn-red">传送 A</button>
        <button id="btn-blue">传送 B</button>
    </div>
    
    <div id="joystick-base"><div id="joystick-stick"></div></div>
    <div id="loading">计算碰撞模型中...<br><span id="load-progress">请稍后</span></div>
    <div id="crosshair"></div>
    <div id="muzzle-flash"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111); 

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.set(0, 50, 0); 
        camera.rotation.order = 'YXZ'; 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const pointLight = new THREE.PointLight(0xffffff, 0.8);
        camera.add(pointLight);
        scene.add(camera);

        let modelsLoaded = 0;
        let mapMeshes = []; // 用于物理碰撞的数组

        function checkLoadingStatus() {
            modelsLoaded++;
            if(modelsLoaded >= 1) { document.getElementById('loading').style.display = 'none'; }
        }

        // 1. 加载 OBJ 地图并注入碰撞检测
        const objLoader = new THREE.OBJLoader();
        objLoader.load('de_dust2.obj', function (obj) {
            obj.traverse(function (child) {
                if (child.isMesh) {
                    child.material = new THREE.MeshStandardMaterial({
                        color: 0xFFB954,
                        metalness: 0.2,
                        roughness: 0.8
                    });
                    mapMeshes.push(child); // 将所有墙面和地板加入碰撞模型库
                }
            });
            obj.rotation.x = -Math.PI / 2; 
            obj.scale.set(0.4, 0.4, 0.4); 
            scene.add(obj);
            checkLoadingStatus();
        });

        // 2. 加载武器
        const gltfLoader = new THREE.GLTFLoader();
        const gunGroup = new THREE.Group();
        camera.add(gunGroup);
        let loadedGunModel = null;
        let defaultGunZ = -0.4; 

        gltfLoader.load('pistol__usp_no_silencer_weapon_model_cs2.glb', function (gltf) {
            loadedGunModel = gltf.scene;
            loadedGunModel.scale.set(1.5, 1.5, 1.5); 
            loadedGunModel.position.set(0.2, -0.15, defaultGunZ); 
            loadedGunModel.rotation.y = Math.PI; 
            gunGroup.add(loadedGunModel);
            checkLoadingStatus();
        });

        // --- 传送功能 ---
        document.getElementById('btn-red').addEventListener('touchstart', (e) => { 
            e.stopPropagation(); camera.position.set(220, 50, 80); 
        });
        document.getElementById('btn-blue').addEventListener('touchstart', (e) => { 
            e.stopPropagation(); camera.position.set(40, 50, 300); 
        });
        document.getElementById('btn-red').onclick = () => camera.position.set(220, 50, 80);
        document.getElementById('btn-blue').onclick = () => camera.position.set(40, 50, 300);

        // --- 控制与交互 ---
        const raycaster = new THREE.Raycaster();
        let moveInput = { x: 0, y: 0 }, touches = { left: null, right: null };
        let isShooting = false;

        document.addEventListener('touchstart', (e) => {
            if(e.target.tagName === 'BUTTON') return;
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2) {
                    touches.left = { id: t.identifier, startX: t.clientX, startY: t.clientY };
                    const joyBase = document.getElementById('joystick-base');
                    joyBase.style.display = 'block'; joyBase.style.left = t.clientX + 'px'; joyBase.style.top = t.clientY + 'px';
                } else {
                    touches.right = { id: t.identifier, lastX: t.clientX, lastY: t.clientY, isTap: true };
                }
            }
        });

        document.addEventListener('touchmove', (e) => {
            for (let t of e.changedTouches) {
                if (touches.left && t.identifier === touches.left.id) {
                    let dx = t.clientX - touches.left.startX, dy = t.clientY - touches.left.startY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > 50) { dx *= 50/dist; dy *= 50/dist; }
                    document.getElementById('joystick-stick').style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                    moveInput.x = (dx / 50) * 1.5; moveInput.y = (dy / 50) * 1.5;
                }
                if (touches.right && t.identifier === touches.right.id) {
                    touches.right.isTap = false;
                    camera.rotation.y -= (t.clientX - touches.right.lastX) * 0.005;
                    camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x - (t.clientY - touches.right.lastY) * 0.005));
                    touches.right.lastX = t.clientX; touches.right.lastY = t.clientY;
                }
            }
        });

        document.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (touches.left && t.identifier === touches.left.id) { touches.left = null; moveInput = { x: 0, y: 0 }; document.getElementById('joystick-base').style.display = 'none'; }
                if (touches.right && t.identifier === touches.right.id) { if (touches.right.isTap) shoot(); touches.right = null; }
            }
        });

        function shoot() {
            if (isShooting || !loadedGunModel) return;
            isShooting = true;
            loadedGunModel.position.z = defaultGunZ + 0.05;
            document.getElementById('muzzle-flash').style.opacity = '1';
            setTimeout(() => { document.getElementById('muzzle-flash').style.opacity = '0'; }, 50);
            setTimeout(() => { isShooting = false; }, 150);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isShooting && loadedGunModel) loadedGunModel.position.z += (defaultGunZ - loadedGunModel.position.z) * 0.2;
            
            // --- 核心物理与移动逻辑 ---
            if (touches.left && mapMeshes.length > 0) {
                const oldPos = camera.position.clone();
                
                // 将输入转换为仅水平方向的世界坐标系移动
                const moveEuler = new THREE.Euler(0, camera.rotation.y, 0, 'YXZ');
                const moveVector = new THREE.Vector3(moveInput.x, 0, moveInput.y).applyEuler(moveEuler);
                
                // 尝试移动
                camera.position.add(moveVector);
                
                // 1. 墙体防穿透检测 (Hitbox)
                const moveDir = new THREE.Vector3().subVectors(camera.position, oldPos);
                if (moveDir.length() > 0.01) {
                    moveDir.normalize();
                    raycaster.set(oldPos, moveDir);
                    const wallIntersects = raycaster.intersectObjects(mapMeshes, true);
                    
                    // 如果离墙壁小于 3 单位，取消本次移动
                    if (wallIntersects.length > 0 && wallIntersects[0].distance < 3) {
                        camera.position.copy(oldPos); 
                    }
                }
            }

            // 2. 引力与地形跟随 (楼梯与斜坡)
            if (mapMeshes.length > 0) {
                raycaster.set(camera.position, new THREE.Vector3(0, -1, 0));
                const floorIntersects = raycaster.intersectObjects(mapMeshes, true);
                
                if (floorIntersects.length > 0) {
                    // 让视角保持在地面上方 50 个单位高度（上坡/下坡平滑过渡）
                    const distToFloor = floorIntersects[0].distance;
                    camera.position.y += (50 - distToFloor) * 0.2; 
                } else {
                    // 脚下没东西？掉下去！
                    camera.position.y -= 2.0; 
                    if (camera.position.y < -200) {
                        // 掉出地图边缘，自动复活到中心点
                        camera.position.set(0, 50, 0); 
                    }
                }
            }

            document.getElementById('coords-display').innerText = `X: ${camera.position.x.toFixed(0)} | Z: ${camera.position.z.toFixed(0)}`;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
